function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

// localStorage-backed storage helper
const storage = {
  get(key) {
    try { return localStorage.getItem(key); } catch (e) { return null; }
  },
  set(key, value) {
    try { localStorage.setItem(key, value); } catch (e) {}
  },
};

    try {
      const p = storage.get('wirtschaft-progress');
      if (p) setProgress(JSON.parse(p));
    } catch (e) {}
    try {
      const s = storage.get('wirtschaft-settings');
      if (s) {
        const parsed = JSON.parse(s);
        if (parsed.direction) setDirection(parsed.direction);
      }
    } catch (e) {}
    setLoaded(true);
  }, []);

  useEffect(() => {
    if (!loaded) return;
    storage.set('wirtschaft-progress', JSON.stringify(progress));
  }, [progress, loaded]);

  useEffect(() => {
    if (!loaded) return;
    storage.set('wirtschaft-settings', JSON.stringify({ direction }));
  }, [direction, loaded]);

  const stats = useMemo(() => {
    let known = 0, learning = 0, fresh = 0;
    VOCAB.forEach(c => {
      const s = progress[c.id]?.status;
      if (s === 'known') known++;
      else if (s === 'learning') learning++;
      else fresh++;
    });
    return { known, learning, fresh, total: VOCAB.length };
  }, [progress]);

  const filteredIds = useMemo(() => {
    if (filter === 'unlearned') {
      return order.filter(id => (progress[id]?.status || 'new') !== 'known');
    }
    if (filter === 'difficult') {
      return order.filter(id => (progress[id]?.wrongCount || 0) >= 2);
    }
    return order;
  }, [filter, order, progress]);

  const safeIdx = filteredIds.length === 0 ? 0 : currentIdx % filteredIds.length;
  const currentCard = filteredIds.length === 0
    ? VOCAB[0]
    : VOCAB.find(c => c.id === filteredIds[safeIdx]);

  const markCard = (cardId, result) => {
    setProgress(p => {
      const cur = p[cardId] || { status: 'new', correctCount: 0, wrongCount: 0 };
      let { correctCount, wrongCount } = cur;
      let newStatus = cur.status;
      if (result === 'known') {
        correctCount++;
        newStatus = 'known';
      } else if (result === 'hard') {
        newStatus = 'learning';
      } else {
        wrongCount++;
        correctCount = Math.max(0, correctCount - 1);
        newStatus = 'learning';
      }
      return { ...p, [cardId]: { status: newStatus, correctCount, wrongCount } };
    });
  };

  const next = () => {
    setFlipped(false);
    setTimeout(() => {
      setCurrentIdx(i => (i + 1) % Math.max(1, filteredIds.length));
    }, 150);
  };

  const prev = () => {
    setFlipped(false);
    setTimeout(() => {
      setCurrentIdx(i => (i - 1 + filteredIds.length) % Math.max(1, filteredIds.length));
    }, 150);
  };

  const handleMark = (result) => {
    if (currentCard) markCard(currentCard.id, result);
    next();
  };

  const reshuffle = () => {
    setOrder(shuffle(VOCAB.map(c => c.id)));
    setCurrentIdx(0);
    setFlipped(false);
  };

  const resetProgress = () => {

    }
  };

  const buildQuiz = () => {
    const pool = VOCAB.filter(c => (progress[c.id]?.status || 'new') !== 'known');
    const source = pool.length >= 4 ? pool : VOCAB;
    const card = source[Math.floor(Math.random() * source.length)];
    const distractorPool = VOCAB.filter(c => c.id !== card.id);
    const distractors = shuffle(distractorPool).slice(0, 3);
    const options = shuffle([card, ...distractors]);
    setQuizCard(card);
    setQuizOptions(options);
    setQuizAnswered(null);
  };

  useEffect(() => {
    if (mode === 'quiz' && loaded && !quizCard) buildQuiz();
  }, [mode, loaded, quizCard]);

  const handleQuizAnswer = (optionId) => {
    if (quizAnswered !== null) return;
    const correct = optionId === quizCard.id;
    setQuizAnswered({ id: optionId, correct });
    if (correct) {
      markCard(quizCard.id, 'known');
      setQuizStreak(s => s + 1);
    } else {
      markCard(quizCard.id, 'unknown');
      setQuizStreak(0);
    }
  };

  const nextQuiz = () => buildQuiz();

  const progressPct = (stats.known / stats.total) * 100;

  return (
    <div className="app-shell" style={{ minHeight: '100vh', background: COLORS.bg, color: COLORS.ink, paddingBottom: '24px' }}>
      <header style={{
        padding: '20px 20px 12px',
        borderBottom: `1px solid ${COLORS.line}`,
        position: 'sticky',
        top: 0,
        background: COLORS.bg,
        zIndex: 10,
      }}>
        <div style={{ display: 'flex', alignItems: 'baseline', justifyContent: 'space-between', marginBottom: '4px' }}>
          <h1 className="display" style={{
            margin: 0,
            fontSize: '32px',
            fontWeight: 500,
            letterSpacing: '-0.02em',
            fontStyle: 'italic',
          }}>
            Wirtschaft
          </h1>
          <div className="mono" style={{ fontSize: '11px', color: COLORS.muted, letterSpacing: '0.05em' }}>
            {stats.known}/{stats.total}
          </div>
        </div>
        <div style={{ fontSize: '12px', color: COLORS.muted, marginBottom: '14px', letterSpacing: '0.02em' }}>
          Словарь по теме «Экономика»
        </div>

        <div style={{ height: '3px', background: COLORS.line, borderRadius: '2px', overflow: 'hidden', marginBottom: '16px' }}>
          <div style={{ height: '100%', width: `${progressPct}%`, background: COLORS.red, transition: 'width 0.5s ease' }} />
        </div>

        <div style={{ display: 'flex', gap: '4px' }}>
          {[
            { id: 'cards', label: 'Карточки', icon: Layers },
            { id: 'quiz',  label: 'Тест',     icon: Brain },
            { id: 'stats', label: 'Прогресс', icon: BarChart3 },
          ].map(t => {
            const Ic = t.icon;
            const active = mode === t.id;
            return (
              <button
                key={t.id}
                onClick={() => setMode(t.id)}
                className="tab-btn"
                style={{
                  flex: 1,
                  padding: '10px 8px',
                  background: active ? COLORS.ink : 'transparent',
                  color: active ? COLORS.paper : COLORS.ink,
                  border: `1px solid ${active ? COLORS.ink : COLORS.line}`,
                  borderRadius: '8px',
                  fontSize: '13px',
                  fontWeight: 500,
                  display: 'flex',
                  alignItems: 'center',
                  justifyContent: 'center',
                  gap: '6px',
                  letterSpacing: '0.01em',
                }}
              >
                <Ic size={14} strokeWidth={2} />
                {t.label}
              </button>
            );
          })}
        </div>
      </header>

      <main style={{ padding: '20px' }}>
        {mode === 'cards' && (
          <CardsMode
            currentCard={currentCard}
            flipped={flipped}
            setFlipped={setFlipped}
            direction={direction}
            setDirection={setDirection}
            currentIdx={safeIdx}
            total={filteredIds.length}
            next={next}
            prev={prev}
            handleMark={handleMark}
            progress={progress}
            filter={filter}
            setFilter={setFilter}
            reshuffle={reshuffle}
            stats={stats}
          />
        )}
        {mode === 'quiz' && quizCard && (
          <QuizMode
            quizCard={quizCard}
            quizOptions={quizOptions}
            direction={direction}
            setDirection={setDirection}
            quizAnswered={quizAnswered}
            handleQuizAnswer={handleQuizAnswer}
            nextQuiz={nextQuiz}
            quizStreak={quizStreak}
          />
        )}
        {mode === 'stats' && (
          <StatsMode
            stats={stats}
            progress={progress}
            resetProgress={resetProgress}
            setMode={setMode}
            setFilter={setFilter}
          />
        )}
      </main>
    </div>
  );
}

function CardsMode({ currentCard, flipped, setFlipped, direction, setDirection, currentIdx, total, next, prev, handleMark, progress, filter, setFilter, reshuffle, stats }) {

  const front = direction === 'de-ru' ? currentCard.de : currentCard.ru;
  const back  = direction === 'de-ru' ? currentCard.ru : currentCard.de;

              borderRadius: '6px',
              padding: '5px 10px',
              fontSize: '11px',
              color: COLORS.ink,
              display: 'flex',
              alignItems: 'center',
              gap: '4px',
              fontFamily: "'JetBrains Mono', monospace",
              letterSpacing: '0.05em',
            }}

            {frontLang}<ArrowLeftRight size={10} />{backLang}

          <button

              border: `1px solid ${COLORS.line}`,

              padding: '5px 10px',
              fontSize: '11px',

      <div style={{ display: 'flex', gap: '6px', marginBottom: '18px', overflowX: 'auto', paddingBottom: '2px' }}>

          { id: 'unlearned', label: `Не выучено · ${stats.fresh + stats.learning}` },
          { id: 'difficult', label: 'Сложные' },
        ].map(f => (
          <button
            key={f.id}
            onClick={() => setFilter(f.id)}
            style={{
              padding: '4px 10px',
              fontSize: '11px',
              borderRadius: '12px',
              border: `1px solid ${filter === f.id ? COLORS.ink : COLORS.line}`,

              letterSpacing: '0.02em',

            {f.label}
          </button>

      </div>

      <div className="card-flip-container" style={{ height: '340px', marginBottom: '20px' }}>
        <div
          className={`card-flip ${flipped ? 'flipped' : ''}`}
          style={{ width: '100%', height: '100%' }}
          onClick={() => setFlipped(f => !f)}

          <div

            style={{
              background: COLORS.paper,
              border: `1px solid ${COLORS.line}`,
              borderRadius: '16px',
              padding: '24px 22px',
              display: 'flex',
              flexDirection: 'column',
              boxShadow: '0 1px 0 rgba(26,22,18,0.04), 0 12px 32px -16px rgba(26,22,18,0.18)',
            }}

              <div style={{

                color: statusColor,
                fontFamily: "'JetBrains Mono', monospace",
                letterSpacing: '0.08em',

            <div style={{ flex: 1, display: 'flex', alignItems: 'center', justifyContent: 'center', padding: '12px 0' }}>
              <div className="display" style={{
                fontSize: front.length > 80 ? '20px' : front.length > 40 ? '24px' : '28px',
                lineHeight: 1.25,
                textAlign: 'center',

              }}>

                № {currentCard.id} · {backLang}

                textAlign: 'center',
                letterSpacing: '-0.005em',

              }}>
                {back}
              </div>

          </div>
        </div>
      </div>

      <div style={{

        gridTemplateColumns: '1fr 1fr 1fr',

            border: `1px solid ${COLORS.line}`,
            borderRadius: '10px',
            color: COLORS.ink,
            display: 'flex',
            alignItems: 'center',
            justifyContent: 'center',
            gap: '6px',
            fontSize: '13px',
          }}
        >
          <ChevronLeft size={16} /> Назад
        </button>
        <button
          onClick={next}
          style={{
            flex: 1,
            padding: '12px',
            background: 'transparent',
            border: `1px solid ${COLORS.line}`,
            borderRadius: '10px',
            color: COLORS.ink,
            display: 'flex',
            alignItems: 'center',
            justifyContent: 'center',
            gap: '6px',
            fontSize: '13px',
          }}
        >
          Дальше <ChevronRight size={16} />
        </button>
      </div>
    </div>
  );
}

function ActionBtn({ onClick, color, icon, label }) {
  return (
    <button
      onClick={onClick}
      style={{
        padding: '13px 6px',
        background: COLORS.paper,
        border: `1.5px solid ${color}`,
        borderRadius: '10px',
        color: color,
        display: 'flex',
        flexDirection: 'column',
        alignItems: 'center',
        gap: '5px',
        fontSize: '11px',
        fontWeight: 600,
        letterSpacing: '0.02em',
      }}
    >
      {icon}
      {label}
    </button>
  );
}

function QuizMode({ quizCard, quizOptions, direction, setDirection, quizAnswered, handleQuizAnswer, nextQuiz, quizStreak }) {
  const prompt = direction === 'de-ru' ? quizCard.de : quizCard.ru;
  const promptLang = direction === 'de-ru' ? 'DE' : 'RU';
  const optionLang = direction === 'de-ru' ? 'RU' : 'DE';

  return (
    <div className="fade-in">
      <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: '16px' }}>
        <div className="mono" style={{ fontSize: '11px', color: COLORS.muted, letterSpacing: '0.08em' }}>
          СЕРИЯ: <span style={{ color: quizStreak > 0 ? COLORS.green : COLORS.muted }}>{quizStreak}</span>
        </div>
        <button
          onClick={() => setDirection(d => d === 'de-ru' ? 'ru-de' : 'de-ru')}
          style={{
            background: 'transparent',
            border: `1px solid ${COLORS.line}`,
            borderRadius: '6px',
            padding: '5px 10px',
            fontSize: '11px',
            color: COLORS.ink,
            display: 'flex',
            alignItems: 'center',
            gap: '4px',
            fontFamily: "'JetBrains Mono', monospace",
            letterSpacing: '0.05em',
          }}
        >
          {promptLang}<ArrowLeftRight size={10} />{optionLang}
        </button>
      </div>

      <div className="grain" style={{
        background: COLORS.paper,
        border: `1px solid ${COLORS.line}`,
        borderRadius: '16px',
        padding: '24px 20px',
        marginBottom: '18px',
        boxShadow: '0 1px 0 rgba(26,22,18,0.04), 0 12px 32px -16px rgba(26,22,18,0.18)',
      }}>
        <div className="mono" style={{ fontSize: '10px', color: COLORS.muted, letterSpacing: '0.1em', marginBottom: '14px', textAlign: 'center' }}>
          ВЫБЕРИТЕ ПРАВИЛЬНЫЙ ПЕРЕВОД · {promptLang}
        </div>
        <div className="display" style={{
          fontSize: prompt.length > 70 ? '20px' : '24px',
          lineHeight: 1.3,
          textAlign: 'center',
          fontStyle: direction === 'de-ru' ? 'normal' : 'italic',
          letterSpacing: '-0.01em',
        }}>
          {prompt}
        </div>
      </div>

      <div style={{ display: 'flex', flexDirection: 'column', gap: '8px', marginBottom: '16px' }}>
        {quizOptions.map((opt, i) => {
          const text = direction === 'de-ru' ? opt.ru : opt.de;
          const isAnswered = quizAnswered !== null;
          const isCorrect = opt.id === quizCard.id;
          const wasPicked = quizAnswered?.id === opt.id;

          let style = {
            background: COLORS.paper,
            borderColor: COLORS.line,
            color: COLORS.ink,
          };
          if (isAnswered) {
            if (isCorrect) {
              style = { background: COLORS.green, borderColor: COLORS.green, color: COLORS.paper };
            } else if (wasPicked) {
              style = { background: COLORS.red, borderColor: COLORS.red, color: COLORS.paper };
            } else {
              style = { background: COLORS.paper, borderColor: COLORS.line, color: COLORS.muted, opacity: 0.55 };
            }
          }

          return (
            <button
              key={opt.id}
              onClick={() => handleQuizAnswer(opt.id)}
              disabled={isAnswered}
              className={isAnswered && wasPicked && !isCorrect ? 'shake' : ''}
              style={{
                padding: '14px 14px',
                border: `1.5px solid ${style.borderColor}`,
                background: style.background,
                color: style.color,
                opacity: style.opacity ?? 1,
                borderRadius: '12px',
                textAlign: 'left',
                fontSize: '14px',
                lineHeight: 1.35,
                display: 'flex',
                gap: '10px',
                alignItems: 'flex-start',
                fontStyle: direction === 'de-ru' ? 'normal' : 'italic',
                fontFamily: direction === 'de-ru' ? "'Geist', sans-serif" : "'Fraunces', Georgia, serif",
                transition: 'all 0.2s ease',
              }}
            >
              <span className="mono" style={{
                fontSize: '11px',
                opacity: 0.6,
                marginTop: '2px',
                minWidth: '14px',
                fontStyle: 'normal',
                fontFamily: "'JetBrains Mono', monospace",
              }}>
                {String.fromCharCode(65 + i)}
              </span>
              <span style={{ flex: 1 }}>{text}</span>
              {isAnswered && isCorrect && <Check size={16} style={{ marginTop: '2px' }} />}
              {isAnswered && wasPicked && !isCorrect && <X size={16} style={{ marginTop: '2px' }} />}
            </button>
          );
        })}
      </div>

      {quizAnswered !== null && (
        <button
          onClick={nextQuiz}
          className="fade-in"
          style={{
            width: '100%',
            padding: '14px',
            background: COLORS.ink,
            color: COLORS.paper,
            border: 'none',
            borderRadius: '12px',
            fontSize: '14px',
            fontWeight: 500,
            display: 'flex',
            alignItems: 'center',
            justifyContent: 'center',
            gap: '8px',
            letterSpacing: '0.02em',
          }}
        >
          Следующее <ChevronRight size={16} />
        </button>
      )}
    </div>
  );
}

    <div className="fade-in">

            background: COLORS.ink,
            border: `1px solid ${COLORS.ink}`,

            textAlign: 'left',
            color: COLORS.paper,
          }}
        >
          <div className="display" style={{ fontSize: '22px', marginBottom: '2px', fontWeight: 500, fontStyle: 'italic' }}>
            Тест
          </div>
          <div style={{ fontSize: '11px', color: 'rgba(248,243,230,0.6)', letterSpacing: '0.03em' }}>
            проверить себя →
          </div>

      </div>

          <div className="mono" style={{ fontSize: '11px', color: COLORS.muted, letterSpacing: '0.1em', marginBottom: '10px' }}>

                style={{
                  padding: '10px 12px',
                  background: COLORS.paper,
                  border: `1px solid ${COLORS.line}`,

          borderRadius: '10px',
          color: COLORS.muted,
          fontSize: '12px',
          display: 'flex',
          alignItems: 'center',
          justifyContent: 'center',
          gap: '6px',
          letterSpacing: '0.02em',
        }}
      >
        <RotateCcw size={13} />
        Сбросить весь прогресс
      </button>

      <div style={{ textAlign: 'center', marginTop: '24px', fontSize: '11px', color: COLORS.muted, letterSpacing: '0.05em' }}>
        <span className="display" style={{ fontStyle: 'italic' }}>Übung macht den Meister</span>
      </div>
    </div>
  );
}

function LegendItem({ color, label, count }) {
  return (
    <div style={{ display: 'flex', alignItems: 'center', gap: '6px' }}>
      <span style={{ width: '8px', height: '8px', borderRadius: '50%', background: color }} />
      <span style={{ color: COLORS.muted }}>{label}</span>
      <span className="mono" style={{ fontSize: '11px', color: COLORS.ink }}>{count}</span>
    </div>
  );
}

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<App />);
</script>
</body>
</html>
