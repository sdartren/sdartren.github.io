  muted:   'var(--muted)',
  line:    'var(--line)',
  green:   'var(--green)',
};

function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

const DAY_MS = 86400000;

// SM-2-ish scheduler. grade ∈ 'again' | 'hard' | 'good'.
function gradeCard(prevSrs, grade) {
  let { ease = 2.5, interval = 0, reps = 0, lapses = 0 } = prevSrs || {};
  if (grade === 'again') {
    ease = Math.max(1.3, ease - 0.2);
    interval = 1;
    reps = 0;
    lapses += 1;
  } else if (grade === 'hard') {
    interval = Math.max(1, Math.round((interval || 1) * 1.2));
    reps += 1;
  } else {
    interval = Math.max(1, Math.round((interval || 1) * ease));
    ease = Math.min(3.0, ease + 0.1);
    reps += 1;
  }
  return { ease, interval, reps, lapses, due: Date.now() + interval * DAY_MS };
}

function srsStatus(srs) {
  if (!srs) return 'new';
  if (srs.reps >= 2) return 'known';
  if (srs.reps >= 1 || srs.lapses > 0) return 'learning';
  return 'new';
}

// One-shot migration: synthesize an srs block from legacy status fields.
function migrateProgress(progressObj) {
  if (!progressObj || typeof progressObj !== 'object') return {};
  const now = Date.now();
  const out = {};
  for (const deckId in progressObj) {
    const dp = progressObj[deckId] || {};
    out[deckId] = {};
    for (const cid in dp) {
      const e = dp[cid] || {};
      if (e.srs) { out[deckId][cid] = e; continue; }
      let srs = null;
      if (e.status === 'known') srs = { ease: 2.5, interval: 7, reps: 2, lapses: 0, due: now + 7 * DAY_MS };
      else if (e.status === 'learning') srs = { ease: 2.3, interval: 1, reps: 1, lapses: e.wrongCount || 0, due: now };
      out[deckId][cid] = srs ? { ...e, srs, status: srsStatus(srs) } : e;
    }
  }
  return out;
}

function normalizeAnswer(s) {
  return String(s || '')
    .toLowerCase()
    .replace(/[.,;:!?„“”"«»()\[\]]/g, ' ')
    .replace(/\s+/g, ' ')
    .trim();
}

// Acceptable variants of the target side, split on / or , or ; or "—".
function acceptableAnswers(card, direction) {
  const target = direction === 'de-ru' ? card.ru : card.de;
  return String(target || '')
    .split(/[\/,;]|\s—\s|\s–\s/)
    .map(normalizeAnswer)
    .filter(Boolean);
}

const TTS_OK = typeof window !== 'undefined' && 'speechSynthesis' in window;

const hasCyrillic = (s) => /[Ѐ-ӿ]/.test(s || '');

// Speak text. Russian text is auto-detected; otherwise use the deck's lang.
function speak(text, deckLang) {
  if (!TTS_OK || !text) return;
  try {
    window.speechSynthesis.cancel();
    const u = new SpeechSynthesisUtterance(text);
    u.lang = hasCyrillic(text) ? 'ru-RU' : (deckLang || 'de-DE');
    u.rate = 0.92;
    window.speechSynthesis.speak(u);
  } catch (e) {}
}

// localStorage-backed storage helper
const storage = {
  get(key) {
    try { return localStorage.getItem(key); } catch (e) { return null; }
  },
  set(key, value) {
    try { localStorage.setItem(key, value); } catch (e) {}
  },
  remove(key) {

  },
};

// Parse a textarea of "front — back" lines into [{id, de, ru}].
// Separators: — – | = , " - ", a tab, or a gap of 2+ spaces (two-column docs).
function parseVocabText(text, existingVocab = []) {
  const lines = String(text || '').split('\n').map(l => l.trim()).filter(Boolean);
  const keyMap = new Map(existingVocab.map(c => [`${c.de}|||${c.ru}`, c.id]));
  let nextId = (existingVocab.reduce((m, c) => Math.max(m, c.id || 0), 0)) + 1;
  const out = [];
  for (const line of lines) {
    const m = line.match(/^(.+?)(?:\s+[—–|=]\s+|\s+-\s+|\t+|\s{2,})(.+)$/);
    if (!m) continue;
    const de = m[1].trim();
    const ru = m[2].trim();
    if (!de || !ru) continue;
    const key = `${de}|||${ru}`;
    const id = keyMap.has(key) ? keyMap.get(key) : nextId++;
    out.push({ id, de, ru });
  }
  return out;
}

function vocabToText(vocab) {
  return (vocab || []).map(c => `${c.de} — ${c.ru}`).join('\n');
}

// Lazy-load a CDN script once; resolves when it's ready.
const _loaded = {};
function loadExternalScript(src) {
  if (_loaded[src]) return _loaded[src];
  _loaded[src] = new Promise((resolve, reject) => {
    const s = document.createElement('script');
    s.src = src;
    s.onload = () => resolve();
    s.onerror = () => { _loaded[src] = null; reject(new Error('Не удалось загрузить ' + src)); };
    document.head.appendChild(s);
  });
  return _loaded[src];
}

const PDFJS_SRC = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js';
const PDFJS_WORKER = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';
const MAMMOTH_SRC = 'https://unpkg.com/mammoth@1.6.0/mammoth.browser.min.js';

async function extractPdfText(file) {
  await loadExternalScript(PDFJS_SRC);
  const pdfjsLib = window.pdfjsLib;
  pdfjsLib.GlobalWorkerOptions.workerSrc = PDFJS_WORKER;
  const data = new Uint8Array(await file.arrayBuffer());
  const pdf = await pdfjsLib.getDocument({ data }).promise;
  const lines = [];
  for (let p = 1; p <= pdf.numPages; p++) {
    const page = await pdf.getPage(p);
    const content = await page.getTextContent();
    let lastY = null, cur = '';
    for (const it of content.items) {
      const y = it.transform ? it.transform[5] : null;
      if (lastY !== null && y !== null && Math.abs(y - lastY) > 2) {
        lines.push(cur.replace(/[ \t]+/g, m => (m.length > 1 ? '  ' : ' ')).trim());
        cur = '';
      }
      cur += it.str + (it.hasEOL ? '\n' : ' ');
      lastY = y;
    }
    if (cur.trim()) lines.push(cur.trim());
  }
  return lines.join('\n');
}

async function extractDocxText(file) {
  await loadExternalScript(MAMMOTH_SRC);
  const arrayBuffer = await file.arrayBuffer();
  const res = await window.mammoth.extractRawText({ arrayBuffer });
  return res.value || '';
}

async function extractDocumentText(file) {
  const name = (file.name || '').toLowerCase();
  if (name.endsWith('.pdf') || file.type === 'application/pdf') return extractPdfText(file);
  if (name.endsWith('.docx')) return extractDocxText(file);
  if (name.endsWith('.txt') || file.type === 'text/plain') return file.text();
  if (name.endsWith('.doc')) throw new Error('Старый формат .doc не поддерживается. Сохраните как .docx или .pdf.');
  throw new Error('Поддерживаются PDF, DOCX и TXT.');
}

        setProgress(migrateProgress(JSON.parse(newP)));
      } else {
        const oldP = storage.get('wirtschaft-progress');
        if (oldP) {
          setProgress(migrateProgress({ wirtschaft: JSON.parse(oldP) }));

      }

    // Settings

      if (s) {
        const parsed = JSON.parse(s);

      }
    } catch (e) {}
    try {
      const t = storage.get('vokabel-theme');
      if (t === 'light' || t === 'dark' || t === 'auto') setTheme(t);
    } catch (e) {}
    setLoaded(true);
  }, []);

  // Resolve + apply theme; track system preference when on 'auto'.
  useEffect(() => {
    const mq = window.matchMedia ? window.matchMedia('(prefers-color-scheme: dark)') : null;
    const apply = () => {
      const resolved = theme === 'auto' ? (mq && mq.matches ? 'dark' : 'light') : theme;
      document.documentElement.dataset.theme = resolved;
      const meta = document.querySelector('meta[name="theme-color"]');
      if (meta) meta.setAttribute('content', resolved === 'dark' ? '#17130F' : '#EFE7D6');
    };
    apply();
    if (theme === 'auto' && mq) {
      mq.addEventListener ? mq.addEventListener('change', apply) : mq.addListener(apply);
      return () => { mq.removeEventListener ? mq.removeEventListener('change', apply) : mq.removeListener(apply); };
    }
  }, [theme]);

  useEffect(() => {
    if (!loaded) return;
    storage.set('vokabel-theme', theme);
  }, [theme, loaded]);

  useEffect(() => {
    if (!loaded) return;
    storage.set('vokabel-decks', JSON.stringify(decks));
  }, [decks, loaded]);

  useEffect(() => {

    setQuizCard(null);
    setQuizStreak(0);

  const stats = useMemo(() => {
    let known = 0, learning = 0, fresh = 0;
    activeDeck.vocab.forEach(c => {
      const s = deckProgress[c.id]?.status;
      if (s === 'known') known++;
      else if (s === 'learning') learning++;
      else fresh++;

    return { known, learning, fresh, total: activeDeck.vocab.length };
  }, [activeDeck, deckProgress]);

  const filteredIds = useMemo(() => {
    const byId = new Map(activeDeck.vocab.map(c => [c.id, c]));
    let base = order.filter(id => byId.has(id));
    if (filter === 'unlearned') {
      base = base.filter(id => (deckProgress[id]?.status || 'new') !== 'known');
    } else if (filter === 'difficult') {
      base = base.filter(id => (deckProgress[id]?.srs?.lapses || 0) >= 2);
    } else if (filter === 'favorite') {
      base = base.filter(id => deckProgress[id]?.favorite);
    }
    // SRS queue: overdue first (oldest due first), then never-seen, then not-yet-due.
    const now = Date.now();
    const due = [], fresh = [], later = [];
    for (const id of base) {
      const s = deckProgress[id]?.srs;
      if (!s) fresh.push(id);
      else if (s.due <= now) due.push(id);
      else later.push(id);
    }
    due.sort((a, b) => deckProgress[a].srs.due - deckProgress[b].srs.due);
    later.sort((a, b) => deckProgress[a].srs.due - deckProgress[b].srs.due);

      <main style={{ padding: '20px' }}>
        {activeDeck.vocab.length === 0 ? (
          <EmptyDeck deck={activeDeck} onAdd={() => setEditingDeck(activeDeck)} />
        ) : (
          <>
            {mode === 'cards' && (
              <CardsMode
                deck={activeDeck}
                currentCard={currentCard}
                flipped={flipped}
                setFlipped={setFlipped}
                direction={direction}
                setDirection={setDirection}
                currentIdx={safeIdx}
                total={filteredIds.length}
                next={next}
                prev={prev}
                handleMark={handleMark}
                deckProgress={deckProgress}
                filter={filter}
                setFilter={setFilter}
                reshuffle={reshuffle}
                stats={stats}
                toggleFavorite={toggleFavorite}
                searchQuery={searchQuery}
                setSearchQuery={setSearchQuery}
              />
            )}
            {mode === 'quiz' && quizCard && (
              <QuizMode
                deck={activeDeck}
                quizCard={quizCard}
                quizOptions={quizOptions}
                direction={direction}
                setDirection={setDirection}
                quizAnswered={quizAnswered}
                handleQuizAnswer={handleQuizAnswer}
                nextQuiz={nextQuiz}
                quizStreak={quizStreak}
                quizSubMode={quizSubMode}
                setQuizSubMode={setQuizSubMode}
                gradeQuiz={gradeQuiz}
              />
            )}
            {mode === 'list' && (
              <ListMode
                deck={activeDeck}
                deckProgress={deckProgress}
                direction={direction}
                searchQuery={searchQuery}
                setSearchQuery={setSearchQuery}
                toggleFavorite={toggleFavorite}
                openCard={openCardInCards}
              />
            )}
            {mode === 'stats' && (
              <StatsMode
                deck={activeDeck}
                stats={stats}
                deckProgress={deckProgress}
                resetProgress={resetProgress}
                setMode={setMode}
                setFilter={setFilter}
                exportData={exportData}
                importData={importData}
                theme={theme}
                setTheme={setTheme}
              />
            )}
          </>
        )}
      </main>

      {showDeckPicker && (
        <DeckPicker
          decks={decks}
          activeDeckId={activeDeckId}
          progress={progress}
          onSelect={(id) => { setActiveDeckId(id); setShowDeckPicker(false); }}
          onClose={() => setShowDeckPicker(false)}
          onEdit={(deck) => setEditingDeck(deck)}
          onDelete={deleteDeck}
          onNew={() => setEditingDeck({
            isNew: true,
            id: '',
            name: '',
            folder: '',
            subtitle: '',
            frontLabel: 'DE',
            backLabel: 'RU',
            vocab: [],
          })}
        />
      )}

      {editingDeck && (
        <DeckEditor
          deck={editingDeck}
          canDelete={decks.length > 1 && !editingDeck.isNew}
          onSave={saveDeck}
          onDelete={deleteDeck}
          onCancel={() => setEditingDeck(null)}
        />
      )}
    </div>
  );
}

function EmptyDeck({ deck, onAdd }) {
  return (
    <div className="fade-in" style={{ textAlign: 'center', padding: '40px 20px' }}>
      <div className="display" style={{ fontSize: '22px', fontStyle: 'italic', marginBottom: '8px' }}>
        Набор пуст
      </div>
      <div style={{ fontSize: '13px', color: COLORS.muted, marginBottom: '20px', lineHeight: 1.4 }}>
        В наборе «{deck.name}» пока нет слов.<br />Добавьте свои.
      </div>
      <button
        onClick={onAdd}
        style={{
          padding: '12px 18px',
          background: COLORS.ink,
          color: COLORS.paper,
          border: 'none',
          borderRadius: '12px',
          fontSize: '14px',
          fontWeight: 500,
          display: 'inline-flex',
          alignItems: 'center',
          gap: '6px',
        }}
      >
        <Plus size={14} /> Добавить слова
      </button>
    </div>
  );
}

function SearchBar({ value, onChange }) {
  return (
    <div style={{ position: 'relative', marginBottom: '12px' }}>
      <span style={{ position: 'absolute', left: '12px', top: '50%', transform: 'translateY(-50%)', color: COLORS.muted, display: 'flex' }}>
        <Search size={14} />
      </span>
      <input
        value={value}
        onChange={e => onChange(e.target.value)}
        placeholder="Поиск по словарю…"
        spellCheck={false}

          padding: '10px 34px 10px 34px',
          background: COLORS.paper,
          border: `1px solid ${COLORS.line}`,

          color: COLORS.ink,
          fontSize: '14px',
          fontFamily: "'Geist', sans-serif",
          outline: 'none',
        }}
      />
      {value && (
        <button
          onClick={() => onChange('')}
          aria-label="Очистить"
          style={{
            position: 'absolute', right: '8px', top: '50%', transform: 'translateY(-50%)',
            background: 'transparent', border: 'none', color: COLORS.muted, display: 'flex', padding: '4px',
          }}
        >
          <X size={14} />
        </button>
      )}

}

function CardsMode({ deck, currentCard, flipped, setFlipped, direction, setDirection, currentIdx, total, next, prev, handleMark, deckProgress, filter, setFilter, reshuffle, stats, toggleFavorite, searchQuery, setSearchQuery }) {
  const touch = React.useRef({ x: 0, y: 0, swiped: false });

  const onTouchStart = (e) => {
    const t = e.changedTouches[0];
    touch.current = { x: t.clientX, y: t.clientY, swiped: false };
  };
  const onTouchEnd = (e) => {
    const t = e.changedTouches[0];
    const dx = t.clientX - touch.current.x;
    const dy = t.clientY - touch.current.y;
    if (Math.abs(dx) > 50 && Math.abs(dx) > Math.abs(dy)) {
      touch.current.swiped = true;
      if (dx < 0) next(); else prev();
    }
  };
  const onCardClick = () => {
    if (touch.current.swiped) { touch.current.swiped = false; return; }
    setFlipped(f => !f);
  };

  const filterChips = (
    <div style={{ display: 'flex', gap: '6px', marginBottom: '18px', overflowX: 'auto', paddingBottom: '2px' }}>
      {[
        { id: 'all',       label: `Все · ${stats.total}` },
        { id: 'unlearned', label: `Не выучено · ${stats.fresh + stats.learning}` },
        { id: 'favorite',  label: '⭐ Избранное' },
        { id: 'difficult', label: 'Сложные' },
      ].map(f => (
        <button
          key={f.id}
          onClick={() => setFilter(f.id)}
          style={{
            padding: '4px 10px',
            fontSize: '11px',
            borderRadius: '12px',
            border: `1px solid ${filter === f.id ? COLORS.ink : COLORS.line}`,
            background: filter === f.id ? COLORS.ink : 'transparent',
            color: filter === f.id ? COLORS.paper : COLORS.ink,
            whiteSpace: 'nowrap',
            letterSpacing: '0.02em',
          }}
        >
          {f.label}
        </button>
      ))}
    </div>
  );

  if (!currentCard || total === 0) {
    return (
      <div className="fade-in">
        {filterChips}
        <div style={{ textAlign: 'center', padding: '40px 20px', color: COLORS.muted, fontSize: '13px' }}>
          Нет карточек для этого фильтра.
        </div>
      </div>
    );
  }

  const cardProgress = deckProgress[currentCard.id];
  const status = cardProgress?.status || 'new';
  const isFav = !!cardProgress?.favorite;
  const statusLabel = { new: 'Новое', learning: 'Изучается', known: 'Выучено' }[status];
  const statusColor = { new: COLORS.muted, learning: COLORS.ochre, known: COLORS.green }[status];

  const front = direction === 'de-ru' ? currentCard.de : currentCard.ru;
  const back  = direction === 'de-ru' ? currentCard.ru : currentCard.de;
  const frontLang = direction === 'de-ru' ? (deck.frontLabel || 'DE') : (deck.backLabel || 'RU');
  const backLang  = direction === 'de-ru' ? (deck.backLabel || 'RU') : (deck.frontLabel || 'DE');

  return (
    <div className="fade-in">
      <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: '14px' }}>
        <div className="mono" style={{ fontSize: '11px', color: COLORS.muted, letterSpacing: '0.08em' }}>
          {String(currentIdx + 1).padStart(2, '0')} / {String(total).padStart(2, '0')}
        </div>
        <div style={{ display: 'flex', gap: '6px' }}>
          <button
            onClick={() => setDirection(d => d === 'de-ru' ? 'ru-de' : 'de-ru')}
            style={{
              background: 'transparent',
              border: `1px solid ${COLORS.line}`,
              borderRadius: '6px',
              padding: '5px 10px',
              fontSize: '11px',
              color: COLORS.ink,
              display: 'flex',
              alignItems: 'center',
              gap: '4px',
              fontFamily: "'JetBrains Mono', monospace",
              letterSpacing: '0.05em',
            }}
          >
            {frontLang}<ArrowLeftRight size={10} />{backLang}
          </button>
          <button
            onClick={reshuffle}
            style={{
              background: 'transparent',
              border: `1px solid ${COLORS.line}`,
              borderRadius: '6px',
              padding: '5px 10px',
              fontSize: '11px',
              color: COLORS.ink,
              display: 'flex',
              alignItems: 'center',
            }}
          >
            <Shuffle size={12} />
          </button>
        </div>
      </div>

      {filterChips}

      <div className="card-flip-container" style={{ height: '340px', marginBottom: '20px', position: 'relative' }}>
        <button
          onClick={(e) => { e.stopPropagation(); toggleFavorite(currentCard.id); }}
          aria-label="В избранное"
          style={{
            position: 'absolute',
            bottom: '14px',
            right: '16px',
            zIndex: 5,
            background: 'transparent',
            border: 'none',
            padding: '6px',
            color: isFav ? COLORS.ochre : (flipped ? 'rgba(var(--paper-rgb),0.5)' : COLORS.muted),
            display: 'flex',
          }}
        >
          <Star size={18} strokeWidth={2} style={{ fill: isFav ? COLORS.ochre : 'none' }} />
        </button>
        {TTS_OK && (
          <button
            onClick={(e) => { e.stopPropagation(); speak(flipped ? back : front, deck.ttsLang); }}
            aria-label="Произнести"
            style={{
              position: 'absolute',
              bottom: '14px',
              left: '16px',
              zIndex: 5,
              background: 'transparent',
              border: 'none',
              padding: '6px',
              color: flipped ? 'rgba(var(--paper-rgb),0.6)' : COLORS.muted,
              display: 'flex',
            }}
          >
            <Volume2 size={18} strokeWidth={2} />
          </button>
        )}
        <div
          className={`card-flip ${flipped ? 'flipped' : ''}`}
          style={{ width: '100%', height: '100%' }}
          onClick={onCardClick}
          onTouchStart={onTouchStart}
          onTouchEnd={onTouchEnd}
        >
          <div
            className="card-face grain"
            style={{
              background: COLORS.paper,
              border: `1px solid ${COLORS.line}`,
              borderRadius: '16px',
              padding: '24px 22px',
              display: 'flex',
              flexDirection: 'column',
              boxShadow: '0 1px 0 rgba(var(--shadow-rgb),0.04), 0 12px 32px -16px rgba(var(--shadow-rgb),0.18)',
            }}
          >
            <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'flex-start', marginBottom: 'auto' }}>
              <div className="mono" style={{ fontSize: '10px', color: COLORS.muted, letterSpacing: '0.1em' }}>
                № {currentCard.id} · {frontLang}
              </div>
              <div style={{
                fontSize: '10px',
                color: statusColor,
                fontFamily: "'JetBrains Mono', monospace",
                letterSpacing: '0.08em',
                textTransform: 'uppercase',
                display: 'flex',
                alignItems: 'center',
                gap: '5px',
              }}>
                <span style={{ width: '5px', height: '5px', borderRadius: '50%', background: statusColor, display: 'inline-block' }} />
                {statusLabel}
              </div>
            </div>

            <div style={{ flex: 1, display: 'flex', alignItems: 'center', justifyContent: 'center', padding: '12px 0' }}>
              <div className="display" style={{
                fontSize: front.length > 80 ? '20px' : front.length > 40 ? '24px' : '28px',
                lineHeight: 1.25,
                textAlign: 'center',
                letterSpacing: '-0.01em',
                fontWeight: 400,
                fontStyle: direction === 'de-ru' ? 'normal' : 'italic',
              }}>
                {front}
              </div>
            </div>

            <div style={{ textAlign: 'center', fontSize: '11px', color: COLORS.muted, letterSpacing: '0.05em', marginTop: 'auto' }}>
              нажмите, чтобы перевернуть
            </div>
          </div>

          <div
            className="card-face card-back grain"
            style={{
              background: COLORS.ink,
              color: COLORS.paper,
              border: `1px solid ${COLORS.ink}`,
              borderRadius: '16px',
              padding: '24px 22px',
              display: 'flex',
              flexDirection: 'column',
              boxShadow: '0 1px 0 rgba(var(--shadow-rgb),0.04), 0 12px 32px -16px rgba(var(--shadow-rgb),0.35)',
            }}
          >
            <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'flex-start' }}>
              <div className="mono" style={{ fontSize: '10px', color: 'rgba(var(--paper-rgb),0.5)', letterSpacing: '0.1em' }}>
                № {currentCard.id} · {backLang}
              </div>
              <div className="mono" style={{ fontSize: '10px', color: COLORS.ochre, letterSpacing: '0.1em' }}>
                ПЕРЕВОД
              </div>
            </div>

            <div style={{ flex: 1, display: 'flex', alignItems: 'center', justifyContent: 'center', padding: '12px 0' }}>
              <div className="display" style={{
                fontSize: back.length > 80 ? '20px' : back.length > 40 ? '23px' : '26px',
                lineHeight: 1.3,
                textAlign: 'center',
                letterSpacing: '-0.005em',
                fontWeight: 400,
                fontStyle: direction === 'de-ru' ? 'italic' : 'normal',
              }}>
                {back}
              </div>
            </div>

            <div style={{ textAlign: 'center', fontSize: '11px', color: 'rgba(var(--paper-rgb),0.5)', letterSpacing: '0.05em' }}>
              оцените, насколько знаете ↓
            </div>
          </div>
        </div>
      </div>

      <div style={{
        display: 'grid',
        gridTemplateColumns: '1fr 1fr 1fr',
        gap: '8px',
        marginBottom: '14px',
      }}>
        <ActionBtn onClick={() => handleMark('unknown')} color={COLORS.red}   icon={<X size={16} strokeWidth={2.5} />}        label="Не знаю" />
        <ActionBtn onClick={() => handleMark('hard')}    color={COLORS.ochre} icon={<Sparkles size={15} strokeWidth={2.2} />} label="Сложно"  />
        <ActionBtn onClick={() => handleMark('known')}   color={COLORS.green} icon={<Check size={16} strokeWidth={2.5} />}    label="Знаю"    />
      </div>

      <div style={{ display: 'flex', gap: '8px' }}>
        <button
          onClick={prev}
          style={{
            flex: 1,
            padding: '12px',
            background: 'transparent',
            border: `1px solid ${COLORS.line}`,
            borderRadius: '10px',
            color: COLORS.ink,
            display: 'flex',
            alignItems: 'center',
            justifyContent: 'center',
            gap: '6px',
            fontSize: '13px',
          }}
        >
          <ChevronLeft size={16} /> Назад
        </button>
        <button
          onClick={next}
          style={{
            flex: 1,
            padding: '12px',
            background: 'transparent',
            border: `1px solid ${COLORS.line}`,
            borderRadius: '10px',
            color: COLORS.ink,
            display: 'flex',
            alignItems: 'center',
            justifyContent: 'center',
            gap: '6px',
            fontSize: '13px',
          }}
        >
          Дальше <ChevronRight size={16} />
        </button>
      </div>
    </div>
  );
}

function ActionBtn({ onClick, color, icon, label }) {
  return (
    <button
      onClick={onClick}
      style={{
        padding: '13px 6px',
        background: COLORS.paper,
        border: `1.5px solid ${color}`,
        borderRadius: '10px',
        color: color,
        display: 'flex',
        flexDirection: 'column',
        alignItems: 'center',
        gap: '5px',
        fontSize: '11px',
        fontWeight: 600,
        letterSpacing: '0.02em',
      }}
    >
      {icon}
      {label}
    </button>
  );
}

function QuizMode({ deck, quizCard, quizOptions, direction, setDirection, quizAnswered, handleQuizAnswer, nextQuiz, quizStreak, quizSubMode, setQuizSubMode, gradeQuiz }) {
  const prompt = direction === 'de-ru' ? quizCard.de : quizCard.ru;
  const promptLang = direction === 'de-ru' ? (deck.frontLabel || 'DE') : (deck.backLabel || 'RU');
  const optionLang = direction === 'de-ru' ? (deck.backLabel || 'RU') : (deck.frontLabel || 'DE');

  return (
    <div className="fade-in">
      <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: '12px' }}>
        <div className="mono" style={{ fontSize: '11px', color: COLORS.muted, letterSpacing: '0.08em' }}>
          СЕРИЯ: <span style={{ color: quizStreak > 0 ? COLORS.green : COLORS.muted }}>{quizStreak}</span>
        </div>
        <button
          onClick={() => setDirection(d => d === 'de-ru' ? 'ru-de' : 'de-ru')}
          style={{
            background: 'transparent',
            border: `1px solid ${COLORS.line}`,
            borderRadius: '6px',
            padding: '5px 10px',
            fontSize: '11px',
            color: COLORS.ink,
            display: 'flex',
            alignItems: 'center',
            gap: '4px',
            fontFamily: "'JetBrains Mono', monospace",
            letterSpacing: '0.05em',
          }}
        >
          {promptLang}<ArrowLeftRight size={10} />{optionLang}
        </button>
      </div>

      <div style={{ display: 'flex', gap: '6px', marginBottom: '16px' }}>
        {[
          { id: 'choice', label: 'Выбор' },
          { id: 'write',  label: 'Напиши' },
          { id: 'listen', label: 'Слушай' },
        ].map(s => (
          <button
            key={s.id}
            onClick={() => { setQuizSubMode(s.id); nextQuiz(); }}
            style={{
              flex: 1,
              padding: '8px 6px',
              fontSize: '12px',
              borderRadius: '9px',
              border: `1px solid ${quizSubMode === s.id ? COLORS.ink : COLORS.line}`,
              background: quizSubMode === s.id ? COLORS.ink : 'transparent',
              color: quizSubMode === s.id ? COLORS.paper : COLORS.ink,
              fontWeight: 500,
              letterSpacing: '0.02em',
            }}
          >
            {s.label}
          </button>
        ))}
      </div>

      {quizSubMode !== 'choice' && (
        <WriteListenMode
          key={quizCard.id + '|' + quizSubMode + '|' + direction}
          deck={deck}
          card={quizCard}
          direction={direction}
          listen={quizSubMode === 'listen'}
          gradeQuiz={gradeQuiz}
          nextQuiz={nextQuiz}
        />
      )}

      {quizSubMode === 'choice' && (<>

      <div className="grain" style={{
        background: COLORS.paper,
        border: `1px solid ${COLORS.line}`,
        borderRadius: '16px',
        padding: '24px 20px',
        marginBottom: '18px',
        boxShadow: '0 1px 0 rgba(var(--shadow-rgb),0.04), 0 12px 32px -16px rgba(var(--shadow-rgb),0.18)',
      }}>
        <div className="mono" style={{ fontSize: '10px', color: COLORS.muted, letterSpacing: '0.1em', marginBottom: '14px', textAlign: 'center' }}>
          ВЫБЕРИТЕ ПРАВИЛЬНЫЙ ПЕРЕВОД · {promptLang}
        </div>
        <div className="display" style={{
          fontSize: prompt.length > 70 ? '20px' : '24px',
          lineHeight: 1.3,
          textAlign: 'center',
          fontStyle: direction === 'de-ru' ? 'normal' : 'italic',
          letterSpacing: '-0.01em',
        }}>
          {prompt}
        </div>
        {TTS_OK && (
          <div style={{ display: 'flex', justifyContent: 'center', marginTop: '14px' }}>
            <button
              onClick={() => speak(prompt, deck.ttsLang)}
              aria-label="Произнести"
              style={{
                background: 'transparent',
                border: `1px solid ${COLORS.line}`,
                borderRadius: '999px',
                padding: '7px 14px',
                color: COLORS.ink,
                display: 'flex',
                alignItems: 'center',
                gap: '6px',
                fontSize: '12px',
              }}
            >
              <Volume2 size={14} /> Прослушать
            </button>
          </div>
        )}
      </div>

      <div style={{ display: 'flex', flexDirection: 'column', gap: '8px', marginBottom: '16px' }}>
        {quizOptions.map((opt, i) => {
          const text = direction === 'de-ru' ? opt.ru : opt.de;
          const isAnswered = quizAnswered !== null;
          const isCorrect = opt.id === quizCard.id;
          const wasPicked = quizAnswered?.id === opt.id;

          let style = {
            background: COLORS.paper,
            borderColor: COLORS.line,
            color: COLORS.ink,
          };
          if (isAnswered) {
            if (isCorrect) {
              style = { background: COLORS.green, borderColor: COLORS.green, color: COLORS.paper };
            } else if (wasPicked) {
              style = { background: COLORS.red, borderColor: COLORS.red, color: COLORS.paper };
            } else {
              style = { background: COLORS.paper, borderColor: COLORS.line, color: COLORS.muted, opacity: 0.55 };
            }
          }

          return (
            <button
              key={opt.id}
              onClick={() => handleQuizAnswer(opt.id)}
              disabled={isAnswered}
              className={isAnswered && wasPicked && !isCorrect ? 'shake' : ''}
              style={{
                padding: '14px 14px',
                border: `1.5px solid ${style.borderColor}`,
                background: style.background,
                color: style.color,
                opacity: style.opacity ?? 1,
                borderRadius: '12px',
                textAlign: 'left',
                fontSize: '14px',
                lineHeight: 1.35,
                display: 'flex',
                gap: '10px',
                alignItems: 'flex-start',
                fontStyle: direction === 'de-ru' ? 'normal' : 'italic',
                fontFamily: direction === 'de-ru' ? "'Geist', sans-serif" : "'Fraunces', Georgia, serif",
                transition: 'all 0.2s ease',
              }}
            >
              <span className="mono" style={{
                fontSize: '11px',
                opacity: 0.6,
                marginTop: '2px',
                minWidth: '14px',
                fontStyle: 'normal',
                fontFamily: "'JetBrains Mono', monospace",
              }}>
                {String.fromCharCode(65 + i)}
              </span>
              <span style={{ flex: 1 }}>{text}</span>
              {isAnswered && isCorrect && <Check size={16} style={{ marginTop: '2px' }} />}
              {isAnswered && wasPicked && !isCorrect && <X size={16} style={{ marginTop: '2px' }} />}
            </button>
          );
        })}
      </div>

      {quizAnswered !== null && (
        <button
          onClick={nextQuiz}
          className="fade-in"
          style={{
            width: '100%',
            padding: '14px',
            background: COLORS.ink,
            color: COLORS.paper,
            border: 'none',
            borderRadius: '12px',
            fontSize: '14px',
            fontWeight: 500,
            display: 'flex',
            alignItems: 'center',
            justifyContent: 'center',
            gap: '8px',
            letterSpacing: '0.02em',
          }}
        >
          Следующее <ChevronRight size={16} />
        </button>
      )}
      </>)}
    </div>
  );
}

function WriteListenMode({ deck, card, direction, listen, gradeQuiz, nextQuiz }) {
  const [value, setValue] = useState('');
  const [result, setResult] = useState(null); // null | { correct, expected }
  const inputRef = React.useRef(null);

  const prompt = direction === 'de-ru' ? card.de : card.ru;
  const expected = direction === 'de-ru' ? card.ru : card.de;
  const promptLang = direction === 'de-ru' ? (deck.frontLabel || 'DE') : (deck.backLabel || 'RU');
  const ttsText = direction === 'de-ru' ? card.de : card.ru;

  const submit = () => {
    if (result) return;
    const ok = acceptableAnswers(card, direction).includes(normalizeAnswer(value));
    setResult({ correct: ok, expected });
    gradeQuiz(ok);
  };

  const reveal = () => {
    if (result) return;
    setResult({ correct: false, expected });
    gradeQuiz(false);
  };

  const borderColor = result ? (result.correct ? COLORS.green : COLORS.red) : COLORS.line;

  return (
    <div className="fade-in">
      <div className="grain" style={{
        background: COLORS.paper,
        border: `1px solid ${COLORS.line}`,
        borderRadius: '16px',
        padding: '24px 20px',
        marginBottom: '16px',
        boxShadow: '0 1px 0 rgba(var(--shadow-rgb),0.04), 0 12px 32px -16px rgba(var(--shadow-rgb),0.18)',
      }}>
        <div className="mono" style={{ fontSize: '10px', color: COLORS.muted, letterSpacing: '0.1em', marginBottom: '14px', textAlign: 'center' }}>
          {listen ? 'ПРОСЛУШАЙТЕ И НАПИШИТЕ ПЕРЕВОД' : `НАПИШИТЕ ПЕРЕВОД · ${promptLang}`}
        </div>
        {listen ? (
          <div style={{ display: 'flex', justifyContent: 'center' }}>
            <button
              onClick={() => speak(ttsText, deck.ttsLang)}
              aria-label="Прослушать"
              style={{
                background: COLORS.ink,
                color: COLORS.paper,
                border: 'none',
                borderRadius: '999px',
                width: '64px',
                height: '64px',
                display: 'flex',
                alignItems: 'center',
                justifyContent: 'center',
              }}
            >
              <Volume2 size={26} />
            </button>
          </div>
        ) : (
          <div className="display" style={{
            fontSize: prompt.length > 70 ? '20px' : '24px',
            lineHeight: 1.3,
            textAlign: 'center',
            fontStyle: direction === 'de-ru' ? 'normal' : 'italic',
            letterSpacing: '-0.01em',
          }}>
            {prompt}
          </div>
        )}
        {listen && result && (
          <div className="display" style={{ marginTop: '16px', fontSize: '18px', textAlign: 'center', color: COLORS.muted }}>
            {prompt}
          </div>
        )}
      </div>

      <input
        ref={inputRef}
        value={value}
        onChange={e => setValue(e.target.value)}
        onKeyDown={e => { if (e.key === 'Enter') (result ? nextQuiz() : submit()); }}
        placeholder="Ваш ответ…"
        spellCheck={false}
        readOnly={!!result}
        style={{
          width: '100%',
          padding: '14px',
          background: COLORS.paper,
          border: `1.5px solid ${borderColor}`,
          borderRadius: '12px',
          color: COLORS.ink,
          fontSize: '16px',
          fontFamily: "'Geist', sans-serif",
          outline: 'none',
          marginBottom: '12px',
        }}
      />

      {result && (
        <div className="fade-in" style={{
          padding: '12px 14px',
          borderRadius: '10px',
          marginBottom: '12px',
          background: result.correct ? COLORS.green : COLORS.red,
          color: COLORS.paper,
          fontSize: '13px',
          lineHeight: 1.4,
        }}>
          {result.correct ? 'Верно!' : <>Правильный ответ: <b>{result.expected}</b></>}
        </div>
      )}

      {!result ? (
        <div style={{ display: 'flex', gap: '8px' }}>
          <button
            onClick={reveal}
            style={{
              flex: 1, padding: '14px', background: 'transparent',
              border: `1px solid ${COLORS.line}`, borderRadius: '12px',
              color: COLORS.muted, fontSize: '13px',
            }}
          >
            Не знаю
          </button>
          <button
            onClick={submit}
            style={{
              flex: 2, padding: '14px', background: COLORS.ink,
              color: COLORS.paper, border: 'none', borderRadius: '12px',
              fontSize: '14px', fontWeight: 500,
            }}
          >
            Проверить
          </button>
        </div>
      ) : (
        <button
          onClick={nextQuiz}
          className="fade-in"
          style={{
            width: '100%', padding: '14px', background: COLORS.ink,
            color: COLORS.paper, border: 'none', borderRadius: '12px',
            fontSize: '14px', fontWeight: 500,
            display: 'flex', alignItems: 'center', justifyContent: 'center', gap: '8px',
          }}
        >
          Следующее <ChevronRight size={16} />
        </button>
      )}
    </div>
  );
}

function Modal({ title, onClose, children }) {
  useEffect(() => {
    const onKey = (e) => { if (e.key === 'Escape') onClose(); };
    window.addEventListener('keydown', onKey);
    document.body.style.overflow = 'hidden';
    return () => {
      window.removeEventListener('keydown', onKey);
      document.body.style.overflow = '';
    };
  }, [onClose]);

  return (
    <div
      onClick={onClose}
      style={{
        position: 'fixed',
        inset: 0,
        background: 'rgba(var(--shadow-rgb),0.55)',
        zIndex: 50,
        display: 'flex',
        alignItems: 'flex-end',
        justifyContent: 'center',
        animation: 'fadeIn 0.2s ease',
      }}
    >
      <div
        onClick={e => e.stopPropagation()}
        style={{
          background: COLORS.bg,
          width: '100%',
          maxWidth: '480px',
          maxHeight: '92vh',
          borderRadius: '20px 20px 0 0',
          padding: '14px 18px 22px',
          overflowY: 'auto',
          boxShadow: '0 -20px 60px -10px rgba(var(--shadow-rgb),0.4)',
          animation: 'fadeIn 0.25s ease',
        }}
      >
        <div style={{
          width: '36px',
          height: '4px',
          background: COLORS.line,
          borderRadius: '2px',
          margin: '0 auto 14px',
        }} />
        <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: '16px' }}>
          <h2 className="display" style={{ margin: 0, fontSize: '22px', fontStyle: 'italic', fontWeight: 500, letterSpacing: '-0.01em' }}>
            {title}
          </h2>
          <button
            onClick={onClose}
            style={{
              background: 'transparent',
              border: `1px solid ${COLORS.line}`,
              borderRadius: '8px',
              padding: '6px',
              color: COLORS.ink,
              display: 'flex',
            }}

            <X size={16} />

        </div>
        {children}
      </div>
    </div>
  );
}

function DeckPicker({ decks, activeDeckId, progress, onSelect, onClose, onEdit, onNew, onDelete }) {
  const canDelete = decks.length > 1;
  const groups = {};
  for (const d of decks) {
    const key = (d.folder || '').trim();
    (groups[key] = groups[key] || []).push(d);
  }
  const named = Object.keys(groups).filter(Boolean).sort((a, b) => a.localeCompare(b, 'ru'));
  const order = [...named, ...(groups[''] ? [''] : [])];

  return (
    <Modal title="Wordie · Наборы" onClose={onClose}>
      <div style={{ display: 'flex', flexDirection: 'column', gap: '8px' }}>
        {order.map(folder => (
          <div key={folder || '__none'} style={{ display: 'flex', flexDirection: 'column', gap: '8px' }}>
            <div className="mono" style={{
              fontSize: '11px',
              color: COLORS.muted,
              letterSpacing: '0.12em',
              textTransform: 'uppercase',
              marginTop: '6px',
              display: 'flex',
              alignItems: 'center',
              gap: '6px',
            }}>
              <Layers size={12} />
              {folder || 'Без папки'}
            </div>
            {groups[folder].map(d => (
              <DeckRow
                key={d.id}
                d={d}
                isActive={d.id === activeDeckId}
                canDelete={canDelete}
                progress={progress}
                onSelect={onSelect}
                onEdit={onEdit}
                onDelete={onDelete}
              />
            ))}
          </div>
        ))}
        <button
          onClick={onNew}
          style={{
            marginTop: '6px',
            padding: '14px',
            background: 'transparent',
            border: `1.5px dashed ${COLORS.muted}`,
            borderRadius: '12px',
            color: COLORS.ink,
            display: 'flex',
            alignItems: 'center',
            justifyContent: 'center',
            gap: '8px',
            fontSize: '14px',
            fontWeight: 500,
          }}
        >
          <Plus size={16} />
          Новый набор
        </button>
      </div>
    </Modal>
  );
}

function DeckEditor({ deck, canDelete, onSave, onDelete, onCancel }) {
  const isNew = !!deck.isNew;
  const [name, setName] = useState(deck.name || '');
  const [folder, setFolder] = useState(deck.folder || '');
  const [subtitle, setSubtitle] = useState(deck.subtitle || '');
  const [frontLabel, setFrontLabel] = useState(deck.frontLabel || 'DE');
  const [backLabel, setBackLabel] = useState(deck.backLabel || 'RU');
  const [ttsLang, setTtsLang] = useState(deck.ttsLang || 'de-DE');
  const [wordsText, setWordsText] = useState(vocabToText(deck.vocab));
  const [importing, setImporting] = useState(false);
  const [importMsg, setImportMsg] = useState('');
  const docInputRef = React.useRef(null);

  const parsedCount = useMemo(() => parseVocabText(wordsText, deck.vocab || []).length, [wordsText, deck.vocab]);

  const handleDocImport = async (file) => {
    if (!file) return;
    setImporting(true);
    setImportMsg('Извлечение текста…');
    try {
      const text = await extractDocumentText(file);
      const clean = String(text || '').replace(/ /g, ' ').trimEnd();
      if (!clean.trim()) {
        setImportMsg('В документе не найден текст (возможно, это скан).');
      } else {
        setWordsText(prev => (prev.trim() ? prev.replace(/\s*$/, '') + '\n' + clean : clean));
        setImportMsg('Готово. Проверьте разделитель и удалите лишние строки.');
      }
    } catch (e) {
      setImportMsg(e.message || 'Не удалось прочитать документ.');
    } finally {
      setImporting(false);
    }
  };

  const handleSave = () => {
    const vocab = parseVocabText(wordsText, deck.vocab || []);
    const updated = {
      id: isNew ? `custom_${Date.now()}_${Math.floor(Math.random() * 1000)}` : deck.id,
      name: name.trim() || 'Без названия',
      folder: folder.trim(),
      subtitle: subtitle.trim(),
      frontLabel: frontLabel.trim() || 'DE',
      backLabel: backLabel.trim() || 'RU',
      ttsLang: ttsLang.trim() || 'de-DE',
      vocab,
    };
    onSave(updated, isNew);
  };

  const handleDelete = () => {
    if (confirm(`Удалить набор «${deck.name}» вместе с прогрессом?`)) {
      onDelete(deck.id);
    }
  };

  const fLabel = frontLabel.trim() || 'DE';
  const bLabel = backLabel.trim() || 'RU';

  return (
    <Modal title={isNew ? 'Новый набор' : 'Редактирование'} onClose={onCancel}>
      <div style={{ display: 'flex', flexDirection: 'column', gap: '14px' }}>
        <Field label="Название">
          <Input value={name} onChange={setName} placeholder="Reisen, Cooking, ..." />
        </Field>
        <Field label="Папка (необязательно)">
          <Input value={folder} onChange={setFolder} placeholder="Deutsch, English, ..." />
        </Field>
        <Field label="Подзаголовок (необязательно)">
          <Input value={subtitle} onChange={setSubtitle} placeholder="Тема, описание..." />
        </Field>
        <div style={{ display: 'flex', gap: '10px' }}>
          <Field label="Метка слова" flex>
            <Input value={frontLabel} onChange={setFrontLabel} placeholder="DE" />
          </Field>
          <Field label="Метка перевода" flex>
            <Input value={backLabel} onChange={setBackLabel} placeholder="RU" />
          </Field>
        </div>
        <Field label="Язык озвучки (код, напр. de-DE, en-US, es-ES)">
          <Input value={ttsLang} onChange={setTtsLang} placeholder="de-DE" />
        </Field>
        <Field label={`Слова  ·  ${parsedCount} распознано`}>
          <div style={{ fontSize: '11px', color: COLORS.muted, marginBottom: '6px', lineHeight: 1.4 }}>
            Одна пара на строку. Разделитель: <span className="mono">—</span>, <span className="mono">–</span>, <span className="mono">|</span>, <span className="mono">=</span>, <span className="mono"> - </span>, табуляция или 2+ пробела.
          </div>
          <button
            type="button"
            onClick={() => docInputRef.current && docInputRef.current.click()}
            disabled={importing}
            style={{
              marginBottom: '8px',
              padding: '10px 12px',
              background: 'transparent',
              border: `1px dashed ${COLORS.muted}`,
              borderRadius: '10px',
              color: COLORS.ink,
              fontSize: '12px',
              fontWeight: 500,
              display: 'flex',
              alignItems: 'center',
              justifyContent: 'center',
              gap: '6px',
              width: '100%',
              opacity: importing ? 0.6 : 1,
            }}
          >
            <Upload size={14} /> {importing ? 'Извлечение…' : 'Импорт из PDF / Word / TXT'}
          </button>
          <input
            ref={docInputRef}
            type="file"
            accept=".pdf,.docx,.txt,application/pdf,text/plain"
            style={{ display: 'none' }}
            onChange={(e) => {
              const f = e.target.files && e.target.files[0];
              handleDocImport(f);
              e.target.value = '';
            }}
          />
          {importMsg && (
            <div style={{ fontSize: '11px', color: COLORS.muted, marginBottom: '8px', lineHeight: 1.4 }}>
              {importMsg}
            </div>
          )}
          <textarea
            value={wordsText}
            onChange={e => setWordsText(e.target.value)}
            rows={12}
            placeholder={`${fLabel === 'DE' ? 'Reise' : 'слово 1'} — ${bLabel === 'RU' ? 'путешествие' : 'translation 1'}\n${fLabel === 'DE' ? 'Hotel' : 'слово 2'} — ${bLabel === 'RU' ? 'отель' : 'translation 2'}\n...`}
            spellCheck={false}
            style={{
              width: '100%',
              padding: '12px',
              fontFamily: "'Geist', sans-serif",
              fontSize: '13px',
              lineHeight: 1.5,
              background: COLORS.paper,
              border: `1px solid ${COLORS.line}`,
              borderRadius: '10px',
              color: COLORS.ink,
              resize: 'vertical',
              minHeight: '180px',
              outline: 'none',
            }}
          />
        </Field>
        <button
          onClick={handleSave}
          style={{
            padding: '14px',
            background: COLORS.ink,
            color: COLORS.paper,
            border: 'none',
            borderRadius: '12px',
            fontSize: '14px',
            fontWeight: 500,
            display: 'flex',
            alignItems: 'center',
            justifyContent: 'center',
            gap: '6px',
          }}
        >
          <Check size={15} />
          {isNew ? 'Создать набор' : 'Сохранить'}
        </button>
        {canDelete && (
          <button
            onClick={handleDelete}
            style={{
              padding: '12px',
              background: 'transparent',
              color: COLORS.red,
              border: `1px solid ${COLORS.red}`,
              borderRadius: '10px',
              fontSize: '13px',
              display: 'flex',
              alignItems: 'center',
              justifyContent: 'center',
              gap: '6px',
            }}
          >
            <Trash2 size={14} /> Удалить набор
          </button>
        )}
      </div>
    </Modal>
  );
}

function Field({ label, children, flex }) {
  return (
    <div style={{ display: 'flex', flexDirection: 'column', gap: '6px', flex: flex ? 1 : 'initial', minWidth: 0 }}>
      <label style={{ fontSize: '11px', color: COLORS.muted, letterSpacing: '0.05em', textTransform: 'uppercase' }}>
        {label}
      </label>
      {children}
    </div>
  );
}

function Input({ value, onChange, placeholder }) {
  return (
    <input
      value={value}
      onChange={e => onChange(e.target.value)}
      placeholder={placeholder}
      spellCheck={false}
      style={{
        padding: '11px 12px',
        background: COLORS.paper,
        border: `1px solid ${COLORS.line}`,
        borderRadius: '10px',
        color: COLORS.ink,
        fontSize: '14px',
        fontFamily: "'Geist', sans-serif",
        width: '100%',
        outline: 'none',
      }}
    />
  );
}

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<App />);
</script>
</body>
</html>
