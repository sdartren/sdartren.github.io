function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

  set(key, value) {

  remove(key) {

};

// Parse a textarea of "front — back" lines into [{id, de, ru}].
// Allowed separators (surrounded by whitespace, except tab): — – | = and " - "
function parseVocabText(text, existingVocab = []) {
  const lines = String(text || '').split('\n').map(l => l.trim()).filter(Boolean);
  const keyMap = new Map(existingVocab.map(c => [`${c.de}|||${c.ru}`, c.id]));
  let nextId = (existingVocab.reduce((m, c) => Math.max(m, c.id || 0), 0)) + 1;
  const out = [];
  for (const line of lines) {
    const m = line.match(/^(.+?)(?:\s+[—–|=]\s+|\s+-\s+|\t)(.+)$/);
    if (!m) continue;
    const de = m[1].trim();
    const ru = m[2].trim();
    if (!de || !ru) continue;
    const key = `${de}|||${ru}`;
    const id = keyMap.has(key) ? keyMap.get(key) : nextId++;
    out.push({ id, de, ru });
  }
  return out;
}

function vocabToText(vocab) {
  return (vocab || []).map(c => `${c.de} — ${c.ru}`).join('\n');
}

  const activeDeck = decks.find(d => d.id === activeDeckId) || decks[0] || BUILTIN_DECK;
  const deckProgress = progress[activeDeckId] || {};

  useEffect(() => {
    // Decks
    try {
      const raw = storage.get('vokabel-decks');
      if (raw) {
        const parsed = JSON.parse(raw);
        if (Array.isArray(parsed) && parsed.length > 0) setDecks(parsed);
      }
    } catch (e) {}
    // Active deck
    try {
      const a = storage.get('vokabel-active');
      if (a) setActiveDeckId(a);
    } catch (e) {}
    // Progress (migrate from old key if needed)
    try {
      const newP = storage.get('vokabel-progress');
      if (newP) {
        setProgress(JSON.parse(newP));
      } else {
        const oldP = storage.get('wirtschaft-progress');
        if (oldP) {
          setProgress({ wirtschaft: JSON.parse(oldP) });
        }
      }
    } catch (e) {}
    // Settings
    try {
      const s = storage.get('wirtschaft-settings');
      if (s) {
        const parsed = JSON.parse(s);
        if (parsed.direction) setDirection(parsed.direction);
      }
    } catch (e) {}
    setLoaded(true);
  }, []);

  useEffect(() => {
    if (!loaded) return;
    storage.set('vokabel-decks', JSON.stringify(decks));
  }, [decks, loaded]);

  useEffect(() => {
    if (!loaded) return;
    storage.set('vokabel-active', activeDeckId);
  }, [activeDeckId, loaded]);

  useEffect(() => {
    if (!loaded) return;
    storage.set('vokabel-progress', JSON.stringify(progress));
  }, [progress, loaded]);

  useEffect(() => {
    if (!loaded) return;
    storage.set('wirtschaft-settings', JSON.stringify({ direction }));
  }, [direction, loaded]);

  // Reset card position when active deck changes.
  useEffect(() => {
    setOrder(activeDeck.vocab.map(c => c.id));
    setCurrentIdx(0);
    setFlipped(false);
    setQuizCard(null);
    setQuizStreak(0);
  }, [activeDeckId]);

  const stats = useMemo(() => {
    let known = 0, learning = 0, fresh = 0;
    activeDeck.vocab.forEach(c => {
      const s = deckProgress[c.id]?.status;
      if (s === 'known') known++;
      else if (s === 'learning') learning++;
      else fresh++;
    });
    return { known, learning, fresh, total: activeDeck.vocab.length };
  }, [activeDeck, deckProgress]);

  const filteredIds = useMemo(() => {
    const validIds = new Set(activeDeck.vocab.map(c => c.id));
    const base = order.filter(id => validIds.has(id));
    if (filter === 'unlearned') {
      return base.filter(id => (deckProgress[id]?.status || 'new') !== 'known');
    }
    if (filter === 'difficult') {
      return base.filter(id => (deckProgress[id]?.wrongCount || 0) >= 2);
    }
    return base;
  }, [filter, order, deckProgress, activeDeck]);

  const safeIdx = filteredIds.length === 0 ? 0 : currentIdx % filteredIds.length;
  const currentCard = filteredIds.length === 0
    ? (activeDeck.vocab[0] || null)
    : activeDeck.vocab.find(c => c.id === filteredIds[safeIdx]);

  const markCard = (cardId, result) => {
    setProgress(p => {
      const dp = p[activeDeckId] || {};
      const cur = dp[cardId] || { status: 'new', correctCount: 0, wrongCount: 0 };
      let { correctCount, wrongCount } = cur;
      let newStatus = cur.status;
      if (result === 'known') {
        correctCount++;
        newStatus = 'known';
      } else if (result === 'hard') {
        newStatus = 'learning';
      } else {
        wrongCount++;
        correctCount = Math.max(0, correctCount - 1);
        newStatus = 'learning';
      }
      return { ...p, [activeDeckId]: { ...dp, [cardId]: { status: newStatus, correctCount, wrongCount } } };
    });
  };

  const next = () => {
    setFlipped(false);
    setTimeout(() => {
      setCurrentIdx(i => (i + 1) % Math.max(1, filteredIds.length));
    }, 150);
  };

  const prev = () => {
    setFlipped(false);
    setTimeout(() => {
      setCurrentIdx(i => (i - 1 + filteredIds.length) % Math.max(1, filteredIds.length));
    }, 150);
  };

  const handleMark = (result) => {
    if (currentCard) markCard(currentCard.id, result);
    next();
  };

  const reshuffle = () => {
    setOrder(shuffle(activeDeck.vocab.map(c => c.id)));
    setCurrentIdx(0);
    setFlipped(false);
  };

  const resetProgress = () => {
    if (confirm(`Сбросить прогресс набора «${activeDeck.name}»?`)) {
      setProgress(p => ({ ...p, [activeDeckId]: {} }));
    }
  };

  const saveDeck = (deck, isNew) => {
    setDecks(ds => isNew ? [...ds, deck] : ds.map(d => d.id === deck.id ? deck : d));
    if (isNew) setActiveDeckId(deck.id);
    if (deck.id === activeDeckId || isNew) {
      setOrder(deck.vocab.map(c => c.id));
      setCurrentIdx(0);
      setFlipped(false);
      setQuizCard(null);
    }
    setEditingDeck(null);
  };

  const deleteDeck = (deckId) => {
    setDecks(ds => {
      const filtered = ds.filter(d => d.id !== deckId);
      return filtered.length > 0 ? filtered : [BUILTIN_DECK];
    });
    setProgress(p => {
      const np = { ...p };
      delete np[deckId];
      return np;
    });
    if (activeDeckId === deckId) {
      const next = decks.find(d => d.id !== deckId);
      setActiveDeckId(next ? next.id : BUILTIN_DECK.id);
    }
    setEditingDeck(null);
    setShowDeckPicker(false);
  };

  const buildQuiz = () => {
    const v = activeDeck.vocab;
    if (v.length < 1) { setQuizCard(null); setQuizOptions([]); return; }
    const pool = v.filter(c => (deckProgress[c.id]?.status || 'new') !== 'known');
    const source = pool.length >= 4 ? pool : v;
    const card = source[Math.floor(Math.random() * source.length)];
    const distractorPool = v.filter(c => c.id !== card.id);
    const distractors = shuffle(distractorPool).slice(0, Math.min(3, distractorPool.length));
    const options = shuffle([card, ...distractors]);
    setQuizCard(card);
    setQuizOptions(options);
    setQuizAnswered(null);
  };

  useEffect(() => {
    if (mode === 'quiz' && loaded && !quizCard) buildQuiz();
  }, [mode, loaded, quizCard]);

  const handleQuizAnswer = (optionId) => {
    if (quizAnswered !== null) return;
    const correct = optionId === quizCard.id;
    setQuizAnswered({ id: optionId, correct });
    if (correct) {
      markCard(quizCard.id, 'known');
      setQuizStreak(s => s + 1);
    } else {
      markCard(quizCard.id, 'unknown');
      setQuizStreak(0);
    }
  };

  const nextQuiz = () => buildQuiz();

  const progressPct = stats.total > 0 ? (stats.known / stats.total) * 100 : 0;

  return (
    <div className="app-shell" style={{ minHeight: '100vh', background: COLORS.bg, color: COLORS.ink, paddingBottom: '24px' }}>
      <header style={{
        padding: '20px 20px 12px',
        borderBottom: `1px solid ${COLORS.line}`,
        position: 'sticky',
        top: 0,
        background: COLORS.bg,
        zIndex: 10,
      }}>
        <div style={{ display: 'flex', alignItems: 'center', justifyContent: 'space-between', marginBottom: '4px', gap: '8px' }}>
          <button
            onClick={() => setShowDeckPicker(true)}
            style={{
              background: 'transparent',
              border: 'none',
              padding: 0,
              color: COLORS.ink,
              display: 'flex',
              alignItems: 'center',
              gap: '6px',
              textAlign: 'left',
              minWidth: 0,
              flex: 1,
            }}
          >
            <h1 className="display" style={{
              margin: 0,
              fontSize: '32px',
              fontWeight: 500,
              letterSpacing: '-0.02em',
              fontStyle: 'italic',
              overflow: 'hidden',
              textOverflow: 'ellipsis',
              whiteSpace: 'nowrap',
              minWidth: 0,
            }}>
              {activeDeck.name}
            </h1>
            <ChevronDown size={16} strokeWidth={2} style={{ opacity: 0.55, flexShrink: 0 }} />
          </button>
          <div className="mono" style={{ fontSize: '11px', color: COLORS.muted, letterSpacing: '0.05em', flexShrink: 0 }}>
            {stats.known}/{stats.total}
          </div>
        </div>
        <div style={{ fontSize: '12px', color: COLORS.muted, marginBottom: '14px', letterSpacing: '0.02em' }}>
          {activeDeck.subtitle || (activeDeck.vocab.length ? `${activeDeck.vocab.length} слов` : 'Пустой набор')}
        </div>

        <div style={{ height: '3px', background: COLORS.line, borderRadius: '2px', overflow: 'hidden', marginBottom: '16px' }}>
          <div style={{ height: '100%', width: `${progressPct}%`, background: COLORS.red, transition: 'width 0.5s ease' }} />
        </div>

        <div style={{ display: 'flex', gap: '4px' }}>
          {[
            { id: 'cards', label: 'Карточки', icon: Layers },
            { id: 'quiz',  label: 'Тест',     icon: Brain },
            { id: 'stats', label: 'Прогресс', icon: BarChart3 },
          ].map(t => {
            const Ic = t.icon;
            const active = mode === t.id;
            return (
              <button
                key={t.id}
                onClick={() => setMode(t.id)}
                className="tab-btn"
                style={{
                  flex: 1,
                  padding: '10px 8px',
                  background: active ? COLORS.ink : 'transparent',
                  color: active ? COLORS.paper : COLORS.ink,
                  border: `1px solid ${active ? COLORS.ink : COLORS.line}`,
                  borderRadius: '8px',
                  fontSize: '13px',
                  fontWeight: 500,
                  display: 'flex',
                  alignItems: 'center',
                  justifyContent: 'center',
                  gap: '6px',
                  letterSpacing: '0.01em',
                }}
              >
                <Ic size={14} strokeWidth={2} />
                {t.label}
              </button>
            );
          })}
        </div>
      </header>

      <main style={{ padding: '20px' }}>
        {activeDeck.vocab.length === 0 ? (
          <EmptyDeck deck={activeDeck} onAdd={() => setEditingDeck(activeDeck)} />
        ) : (
          <>
            {mode === 'cards' && (
              <CardsMode
                deck={activeDeck}
                currentCard={currentCard}
                flipped={flipped}
                setFlipped={setFlipped}
                direction={direction}
                setDirection={setDirection}
                currentIdx={safeIdx}
                total={filteredIds.length}
                next={next}
                prev={prev}
                handleMark={handleMark}
                deckProgress={deckProgress}
                filter={filter}
                setFilter={setFilter}
                reshuffle={reshuffle}
                stats={stats}
              />
            )}
            {mode === 'quiz' && quizCard && (
              <QuizMode
                deck={activeDeck}
                quizCard={quizCard}
                quizOptions={quizOptions}
                direction={direction}
                setDirection={setDirection}
                quizAnswered={quizAnswered}
                handleQuizAnswer={handleQuizAnswer}
                nextQuiz={nextQuiz}
                quizStreak={quizStreak}
              />
            )}
            {mode === 'stats' && (
              <StatsMode
                deck={activeDeck}
                stats={stats}
                deckProgress={deckProgress}
                resetProgress={resetProgress}
                setMode={setMode}
                setFilter={setFilter}
              />
            )}
          </>
        )}
      </main>

      {showDeckPicker && (
        <DeckPicker
          decks={decks}
          activeDeckId={activeDeckId}
          progress={progress}
          onSelect={(id) => { setActiveDeckId(id); setShowDeckPicker(false); }}
          onClose={() => setShowDeckPicker(false)}
          onEdit={(deck) => setEditingDeck(deck)}
          onDelete={deleteDeck}
          onNew={() => setEditingDeck({
            isNew: true,
            id: '',
            name: '',
            subtitle: '',
            frontLabel: 'DE',
            backLabel: 'RU',
            vocab: [],
          })}
        />
      )}

      {editingDeck && (
        <DeckEditor
          deck={editingDeck}
          canDelete={decks.length > 1 && !editingDeck.isNew}
          onSave={saveDeck}
          onDelete={deleteDeck}
          onCancel={() => setEditingDeck(null)}
        />
      )}
    </div>
  );
}

  return (
    <div className="fade-in" style={{ textAlign: 'center', padding: '40px 20px' }}>
      <div className="display" style={{ fontSize: '22px', fontStyle: 'italic', marginBottom: '8px' }}>
        Набор пуст

      </div>
      <button
        onClick={onAdd}
        style={{
          padding: '12px 18px',
          background: COLORS.ink,
          color: COLORS.paper,
          border: 'none',
          borderRadius: '12px',
          fontSize: '14px',
          fontWeight: 500,
          display: 'inline-flex',
          alignItems: 'center',
          gap: '6px',

}

function CardsMode({ deck, currentCard, flipped, setFlipped, direction, setDirection, currentIdx, total, next, prev, handleMark, deckProgress, filter, setFilter, reshuffle, stats }) {
  if (!currentCard) return null;
  const cardProgress = deckProgress[currentCard.id];
  const status = cardProgress?.status || 'new';
  const statusLabel = { new: 'Новое', learning: 'Изучается', known: 'Выучено' }[status];
  const statusColor = { new: COLORS.muted, learning: COLORS.ochre, known: COLORS.green }[status];

  const front = direction === 'de-ru' ? currentCard.de : currentCard.ru;
  const back  = direction === 'de-ru' ? currentCard.ru : currentCard.de;
  const frontLang = direction === 'de-ru' ? (deck.frontLabel || 'DE') : (deck.backLabel || 'RU');
  const backLang  = direction === 'de-ru' ? (deck.backLabel || 'RU') : (deck.frontLabel || 'DE');

  return (
    <div className="fade-in">
      <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: '14px' }}>
        <div className="mono" style={{ fontSize: '11px', color: COLORS.muted, letterSpacing: '0.08em' }}>
          {String(currentIdx + 1).padStart(2, '0')} / {String(total).padStart(2, '0')}
        </div>
        <div style={{ display: 'flex', gap: '6px' }}>
          <button
            onClick={() => setDirection(d => d === 'de-ru' ? 'ru-de' : 'de-ru')}
            style={{
              background: 'transparent',
              border: `1px solid ${COLORS.line}`,
              borderRadius: '6px',
              padding: '5px 10px',
              fontSize: '11px',
              color: COLORS.ink,
              display: 'flex',
              alignItems: 'center',
              gap: '4px',
              fontFamily: "'JetBrains Mono', monospace",
              letterSpacing: '0.05em',
            }}
          >
            {frontLang}<ArrowLeftRight size={10} />{backLang}
          </button>
          <button
            onClick={reshuffle}
            style={{
              background: 'transparent',
              border: `1px solid ${COLORS.line}`,
              borderRadius: '6px',
              padding: '5px 10px',
              fontSize: '11px',
              color: COLORS.ink,
              display: 'flex',
              alignItems: 'center',
            }}
          >
            <Shuffle size={12} />
          </button>
        </div>
      </div>

      <div style={{ display: 'flex', gap: '6px', marginBottom: '18px', overflowX: 'auto', paddingBottom: '2px' }}>
        {[
          { id: 'all',       label: `Все · ${stats.total}` },
          { id: 'unlearned', label: `Не выучено · ${stats.fresh + stats.learning}` },
          { id: 'difficult', label: 'Сложные' },
        ].map(f => (
          <button
            key={f.id}
            onClick={() => setFilter(f.id)}
            style={{
              padding: '4px 10px',
              fontSize: '11px',
              borderRadius: '12px',
              border: `1px solid ${filter === f.id ? COLORS.ink : COLORS.line}`,
              background: filter === f.id ? COLORS.ink : 'transparent',
              color: filter === f.id ? COLORS.paper : COLORS.ink,
              whiteSpace: 'nowrap',
              letterSpacing: '0.02em',
            }}
          >
            {f.label}
          </button>
        ))}
      </div>

      <div className="card-flip-container" style={{ height: '340px', marginBottom: '20px' }}>
        <div
          className={`card-flip ${flipped ? 'flipped' : ''}`}
          style={{ width: '100%', height: '100%' }}
          onClick={() => setFlipped(f => !f)}
        >
          <div
            className="card-face grain"
            style={{
              background: COLORS.paper,
              border: `1px solid ${COLORS.line}`,
              borderRadius: '16px',
              padding: '24px 22px',
              display: 'flex',
              flexDirection: 'column',
              boxShadow: '0 1px 0 rgba(26,22,18,0.04), 0 12px 32px -16px rgba(26,22,18,0.18)',
            }}
          >
            <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'flex-start', marginBottom: 'auto' }}>
              <div className="mono" style={{ fontSize: '10px', color: COLORS.muted, letterSpacing: '0.1em' }}>
                № {currentCard.id} · {frontLang}
              </div>
              <div style={{
                fontSize: '10px',
                color: statusColor,
                fontFamily: "'JetBrains Mono', monospace",
                letterSpacing: '0.08em',
                textTransform: 'uppercase',
                display: 'flex',
                alignItems: 'center',
                gap: '5px',
              }}>
                <span style={{ width: '5px', height: '5px', borderRadius: '50%', background: statusColor, display: 'inline-block' }} />
                {statusLabel}
              </div>
            </div>

            <div style={{ flex: 1, display: 'flex', alignItems: 'center', justifyContent: 'center', padding: '12px 0' }}>
              <div className="display" style={{
                fontSize: front.length > 80 ? '20px' : front.length > 40 ? '24px' : '28px',
                lineHeight: 1.25,
                textAlign: 'center',
                letterSpacing: '-0.01em',
                fontWeight: 400,
                fontStyle: direction === 'de-ru' ? 'normal' : 'italic',
              }}>
                {front}
              </div>
            </div>

            <div style={{ textAlign: 'center', fontSize: '11px', color: COLORS.muted, letterSpacing: '0.05em', marginTop: 'auto' }}>
              нажмите, чтобы перевернуть
            </div>
          </div>

          <div
            className="card-face card-back grain"
            style={{
              background: COLORS.ink,
              color: COLORS.paper,
              border: `1px solid ${COLORS.ink}`,
              borderRadius: '16px',
              padding: '24px 22px',
              display: 'flex',
              flexDirection: 'column',
              boxShadow: '0 1px 0 rgba(26,22,18,0.04), 0 12px 32px -16px rgba(26,22,18,0.35)',
            }}
          >
            <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'flex-start' }}>
              <div className="mono" style={{ fontSize: '10px', color: 'rgba(248,243,230,0.5)', letterSpacing: '0.1em' }}>
                № {currentCard.id} · {backLang}
              </div>
              <div className="mono" style={{ fontSize: '10px', color: COLORS.ochre, letterSpacing: '0.1em' }}>
                ПЕРЕВОД
              </div>
            </div>

            <div style={{ flex: 1, display: 'flex', alignItems: 'center', justifyContent: 'center', padding: '12px 0' }}>
              <div className="display" style={{
                fontSize: back.length > 80 ? '20px' : back.length > 40 ? '23px' : '26px',
                lineHeight: 1.3,
                textAlign: 'center',
                letterSpacing: '-0.005em',
                fontWeight: 400,
                fontStyle: direction === 'de-ru' ? 'italic' : 'normal',
              }}>
                {back}
              </div>
            </div>

            <div style={{ textAlign: 'center', fontSize: '11px', color: 'rgba(248,243,230,0.5)', letterSpacing: '0.05em' }}>
              оцените, насколько знаете ↓
            </div>
          </div>
        </div>
      </div>

      <div style={{
        display: 'grid',
        gridTemplateColumns: '1fr 1fr 1fr',
        gap: '8px',
        marginBottom: '14px',
        opacity: flipped ? 1 : 0.35,
        pointerEvents: flipped ? 'auto' : 'none',
        transition: 'opacity 0.3s ease',
      }}>
        <ActionBtn onClick={() => handleMark('unknown')} color={COLORS.red}   icon={<X size={16} strokeWidth={2.5} />}        label="Не знаю" />
        <ActionBtn onClick={() => handleMark('hard')}    color={COLORS.ochre} icon={<Sparkles size={15} strokeWidth={2.2} />} label="Сложно"  />
        <ActionBtn onClick={() => handleMark('known')}   color={COLORS.green} icon={<Check size={16} strokeWidth={2.5} />}    label="Знаю"    />
      </div>

      <div style={{ display: 'flex', gap: '8px' }}>
        <button
          onClick={prev}
          style={{
            flex: 1,
            padding: '12px',
            background: 'transparent',
            border: `1px solid ${COLORS.line}`,
            borderRadius: '10px',
            color: COLORS.ink,
            display: 'flex',
            alignItems: 'center',
            justifyContent: 'center',
            gap: '6px',
            fontSize: '13px',
          }}
        >
          <ChevronLeft size={16} /> Назад
        </button>
        <button
          onClick={next}
          style={{
            flex: 1,
            padding: '12px',
            background: 'transparent',
            border: `1px solid ${COLORS.line}`,
            borderRadius: '10px',
            color: COLORS.ink,
            display: 'flex',
            alignItems: 'center',
            justifyContent: 'center',
            gap: '6px',
            fontSize: '13px',
          }}
        >
          Дальше <ChevronRight size={16} />
        </button>
      </div>
    </div>
  );
}

function ActionBtn({ onClick, color, icon, label }) {

    <button
      onClick={onClick}
      style={{
        padding: '13px 6px',
        background: COLORS.paper,
        border: `1.5px solid ${color}`,
        borderRadius: '10px',
        color: color,
        display: 'flex',
        flexDirection: 'column',
        alignItems: 'center',
        gap: '5px',
        fontSize: '11px',
        fontWeight: 600,
        letterSpacing: '0.02em',
      }}
    >
      {icon}
      {label}
    </button>
  );
}

function QuizMode({ deck, quizCard, quizOptions, direction, setDirection, quizAnswered, handleQuizAnswer, nextQuiz, quizStreak }) {
  const prompt = direction === 'de-ru' ? quizCard.de : quizCard.ru;
  const promptLang = direction === 'de-ru' ? (deck.frontLabel || 'DE') : (deck.backLabel || 'RU');
  const optionLang = direction === 'de-ru' ? (deck.backLabel || 'RU') : (deck.frontLabel || 'DE');

  return (
    <div className="fade-in">
      <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: '16px' }}>
        <div className="mono" style={{ fontSize: '11px', color: COLORS.muted, letterSpacing: '0.08em' }}>
          СЕРИЯ: <span style={{ color: quizStreak > 0 ? COLORS.green : COLORS.muted }}>{quizStreak}</span>
        </div>
        <button
          onClick={() => setDirection(d => d === 'de-ru' ? 'ru-de' : 'de-ru')}
          style={{
            background: 'transparent',
            border: `1px solid ${COLORS.line}`,
            borderRadius: '6px',
            padding: '5px 10px',
            fontSize: '11px',
            color: COLORS.ink,
            display: 'flex',
            alignItems: 'center',
            gap: '4px',
            fontFamily: "'JetBrains Mono', monospace",
            letterSpacing: '0.05em',
          }}
        >
          {promptLang}<ArrowLeftRight size={10} />{optionLang}
        </button>
      </div>

      <div className="grain" style={{
        background: COLORS.paper,
        border: `1px solid ${COLORS.line}`,
        borderRadius: '16px',
        padding: '24px 20px',
        marginBottom: '18px',
        boxShadow: '0 1px 0 rgba(26,22,18,0.04), 0 12px 32px -16px rgba(26,22,18,0.18)',
      }}>
        <div className="mono" style={{ fontSize: '10px', color: COLORS.muted, letterSpacing: '0.1em', marginBottom: '14px', textAlign: 'center' }}>
          ВЫБЕРИТЕ ПРАВИЛЬНЫЙ ПЕРЕВОД · {promptLang}
        </div>
        <div className="display" style={{
          fontSize: prompt.length > 70 ? '20px' : '24px',
          lineHeight: 1.3,
          textAlign: 'center',
          fontStyle: direction === 'de-ru' ? 'normal' : 'italic',
          letterSpacing: '-0.01em',
        }}>
          {prompt}
        </div>
      </div>

      <div style={{ display: 'flex', flexDirection: 'column', gap: '8px', marginBottom: '16px' }}>
        {quizOptions.map((opt, i) => {
          const text = direction === 'de-ru' ? opt.ru : opt.de;
          const isAnswered = quizAnswered !== null;
          const isCorrect = opt.id === quizCard.id;
          const wasPicked = quizAnswered?.id === opt.id;

          let style = {
            background: COLORS.paper,
            borderColor: COLORS.line,
            color: COLORS.ink,
          };
          if (isAnswered) {
            if (isCorrect) {
              style = { background: COLORS.green, borderColor: COLORS.green, color: COLORS.paper };
            } else if (wasPicked) {
              style = { background: COLORS.red, borderColor: COLORS.red, color: COLORS.paper };
            } else {
              style = { background: COLORS.paper, borderColor: COLORS.line, color: COLORS.muted, opacity: 0.55 };
            }
          }

          return (
            <button
              key={opt.id}
              onClick={() => handleQuizAnswer(opt.id)}
              disabled={isAnswered}
              className={isAnswered && wasPicked && !isCorrect ? 'shake' : ''}
              style={{
                padding: '14px 14px',
                border: `1.5px solid ${style.borderColor}`,
                background: style.background,
                color: style.color,
                opacity: style.opacity ?? 1,
                borderRadius: '12px',
                textAlign: 'left',
                fontSize: '14px',
                lineHeight: 1.35,
                display: 'flex',
                gap: '10px',
                alignItems: 'flex-start',
                fontStyle: direction === 'de-ru' ? 'normal' : 'italic',
                fontFamily: direction === 'de-ru' ? "'Geist', sans-serif" : "'Fraunces', Georgia, serif",
                transition: 'all 0.2s ease',
              }}
            >
              <span className="mono" style={{
                fontSize: '11px',
                opacity: 0.6,
                marginTop: '2px',
                minWidth: '14px',
                fontStyle: 'normal',
                fontFamily: "'JetBrains Mono', monospace",
              }}>
                {String.fromCharCode(65 + i)}
              </span>
              <span style={{ flex: 1 }}>{text}</span>
              {isAnswered && isCorrect && <Check size={16} style={{ marginTop: '2px' }} />}
              {isAnswered && wasPicked && !isCorrect && <X size={16} style={{ marginTop: '2px' }} />}
            </button>
          );
        })}
      </div>

      {quizAnswered !== null && (
        <button
          onClick={nextQuiz}
          className="fade-in"
          style={{
            width: '100%',
            padding: '14px',
            background: COLORS.ink,
            color: COLORS.paper,
            border: 'none',
            borderRadius: '12px',
            fontSize: '14px',
            fontWeight: 500,
            display: 'flex',
            alignItems: 'center',
            justifyContent: 'center',
            gap: '8px',
            letterSpacing: '0.02em',
          }}
        >
          Следующее <ChevronRight size={16} />
        </button>
      )}
    </div>
  );
}

function StatsMode({ deck, stats, deckProgress, resetProgress, setMode, setFilter }) {
  const difficultCards = deck.vocab.filter(c => (deckProgress[c.id]?.wrongCount || 0) >= 2);
  const pct = stats.total > 0 ? Math.round((stats.known / stats.total) * 100) : 0;

  return (
    <div className="fade-in">
      <div style={{ marginBottom: '24px' }}>
        <div className="mono" style={{ fontSize: '11px', color: COLORS.muted, letterSpacing: '0.1em', marginBottom: '8px' }}>
          ОБЩИЙ ПРОГРЕСС
        </div>
        <div style={{ display: 'flex', alignItems: 'baseline', gap: '8px', marginBottom: '4px' }}>
          <div className="display" style={{ fontSize: '64px', lineHeight: 1, fontWeight: 400, letterSpacing: '-0.03em' }}>
            {stats.known}
          </div>
          <div className="display" style={{ fontSize: '24px', color: COLORS.muted, fontStyle: 'italic' }}>
            / {stats.total}
          </div>
        </div>
        <div style={{ fontSize: '12px', color: COLORS.muted }}>
          {pct}% слов выучено
        </div>
      </div>

      <div style={{ marginBottom: '24px' }}>
        <div style={{ display: 'flex', height: '10px', borderRadius: '5px', overflow: 'hidden', background: COLORS.line, marginBottom: '10px' }}>
          {stats.known    > 0 && <div style={{ width: `${(stats.known    / stats.total) * 100}%`, background: COLORS.green }} />}
          {stats.learning > 0 && <div style={{ width: `${(stats.learning / stats.total) * 100}%`, background: COLORS.ochre }} />}
          {stats.fresh    > 0 && <div style={{ width: `${(stats.fresh    / stats.total) * 100}%`, background: COLORS.line  }} />}
        </div>
        <div style={{ display: 'flex', gap: '12px', flexWrap: 'wrap', fontSize: '12px' }}>
          <LegendItem color={COLORS.green} label="Выучено"   count={stats.known}    />
          <LegendItem color={COLORS.ochre} label="Изучается" count={stats.learning} />
          <LegendItem color={COLORS.muted} label="Новое"     count={stats.fresh}    />
        </div>
      </div>

      <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: '8px', marginBottom: '24px' }}>
        <button
          onClick={() => { setFilter('unlearned'); setMode('cards'); }}
          style={{
            padding: '14px 12px',
            background: COLORS.paper,
            border: `1px solid ${COLORS.line}`,
            borderRadius: '12px',
            textAlign: 'left',
            color: COLORS.ink,
          }}
        >
          <div className="display" style={{ fontSize: '22px', marginBottom: '2px', fontWeight: 500 }}>
            {stats.fresh + stats.learning}
          </div>
          <div style={{ fontSize: '11px', color: COLORS.muted, letterSpacing: '0.03em' }}>
            повторить →
          </div>
        </button>
        <button
          onClick={() => setMode('quiz')}
          style={{
            padding: '14px 12px',
            background: COLORS.ink,
            border: `1px solid ${COLORS.ink}`,
            borderRadius: '12px',
            textAlign: 'left',
            color: COLORS.paper,
          }}
        >
          <div className="display" style={{ fontSize: '22px', marginBottom: '2px', fontWeight: 500, fontStyle: 'italic' }}>
            Тест
          </div>
          <div style={{ fontSize: '11px', color: 'rgba(248,243,230,0.6)', letterSpacing: '0.03em' }}>
            проверить себя →
          </div>
        </button>
      </div>

      {difficultCards.length > 0 && (
        <div style={{ marginBottom: '24px' }}>
          <div className="mono" style={{ fontSize: '11px', color: COLORS.muted, letterSpacing: '0.1em', marginBottom: '10px' }}>
            СЛОЖНЫЕ СЛОВА · {difficultCards.length}
          </div>
          <div style={{ display: 'flex', flexDirection: 'column', gap: '6px' }}>
            {difficultCards.slice(0, 5).map(c => (
              <div
                key={c.id}
                style={{
                  padding: '10px 12px',
                  background: COLORS.paper,
                  border: `1px solid ${COLORS.line}`,
                  borderLeft: `3px solid ${COLORS.red}`,
                  borderRadius: '8px',
                  fontSize: '13px',
                }}
              >
                <div className="display" style={{ fontSize: '14px', marginBottom: '2px', lineHeight: 1.3 }}>{c.de}</div>
                <div style={{ fontSize: '11px', color: COLORS.muted, lineHeight: 1.3 }}>{c.ru}</div>
              </div>
            ))}
          </div>
        </div>
      )}

      <button
        onClick={resetProgress}
        style={{
          width: '100%',
          padding: '12px',
          background: 'transparent',
          border: `1px solid ${COLORS.line}`,
          borderRadius: '10px',
          color: COLORS.muted,
          fontSize: '12px',
          display: 'flex',
          alignItems: 'center',
          justifyContent: 'center',
          gap: '6px',
          letterSpacing: '0.02em',
        }}
      >
        <RotateCcw size={13} />
        Сбросить весь прогресс
      </button>

      <div style={{ textAlign: 'center', marginTop: '24px', fontSize: '11px', color: COLORS.muted, letterSpacing: '0.05em' }}>
        <span className="display" style={{ fontStyle: 'italic' }}>Übung macht den Meister</span>
      </div>
    </div>
  );
}

function LegendItem({ color, label, count }) {
  return (
    <div style={{ display: 'flex', alignItems: 'center', gap: '6px' }}>
      <span style={{ width: '8px', height: '8px', borderRadius: '50%', background: color }} />
      <span style={{ color: COLORS.muted }}>{label}</span>
      <span className="mono" style={{ fontSize: '11px', color: COLORS.ink }}>{count}</span>
    </div>
  );
}

// ---- Deck management UI ----

function Modal({ title, onClose, children }) {
  useEffect(() => {
    const onKey = (e) => { if (e.key === 'Escape') onClose(); };
    window.addEventListener('keydown', onKey);
    document.body.style.overflow = 'hidden';
    return () => {
      window.removeEventListener('keydown', onKey);
      document.body.style.overflow = '';
    };
  }, [onClose]);

  return (
    <div
      onClick={onClose}
      style={{
        position: 'fixed',
        inset: 0,
        background: 'rgba(26,22,18,0.55)',
        zIndex: 50,
        display: 'flex',
        alignItems: 'flex-end',
        justifyContent: 'center',
        animation: 'fadeIn 0.2s ease',
      }}
    >
      <div
        onClick={e => e.stopPropagation()}
        style={{
          background: COLORS.bg,
          width: '100%',
          maxWidth: '480px',
          maxHeight: '92vh',
          borderRadius: '20px 20px 0 0',
          padding: '14px 18px 22px',
          overflowY: 'auto',
          boxShadow: '0 -20px 60px -10px rgba(26,22,18,0.4)',
          animation: 'fadeIn 0.25s ease',
        }}
      >
        <div style={{
          width: '36px',
          height: '4px',
          background: COLORS.line,
          borderRadius: '2px',
          margin: '0 auto 14px',
        }} />
        <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: '16px' }}>
          <h2 className="display" style={{ margin: 0, fontSize: '22px', fontStyle: 'italic', fontWeight: 500, letterSpacing: '-0.01em' }}>
            {title}
          </h2>
          <button
            onClick={onClose}
            style={{
              background: 'transparent',
              border: `1px solid ${COLORS.line}`,
              borderRadius: '8px',
              padding: '6px',
              color: COLORS.ink,
              display: 'flex',
            }}
          >
            <X size={16} />
          </button>
        </div>
        {children}
      </div>
    </div>
  );
}

function DeckPicker({ decks, activeDeckId, progress, onSelect, onClose, onEdit, onNew, onDelete }) {
  return (
    <Modal title="Наборы" onClose={onClose}>
      <div style={{ display: 'flex', flexDirection: 'column', gap: '8px' }}>
        {decks.map(d => {
          const dp = progress[d.id] || {};
          const known = d.vocab.filter(c => dp[c.id]?.status === 'known').length;
          const isActive = d.id === activeDeckId;
          const canDelete = decks.length > 1;
          const dividerColor = isActive ? 'rgba(248,243,230,0.2)' : COLORS.line;
          return (
            <div
              key={d.id}
              style={{
                display: 'flex',
                alignItems: 'stretch',
                gap: '0',
                background: isActive ? COLORS.ink : COLORS.paper,
                color: isActive ? COLORS.paper : COLORS.ink,
                border: `1px solid ${isActive ? COLORS.ink : COLORS.line}`,
                borderRadius: '12px',
                overflow: 'hidden',
              }}
            >
              <button
                onClick={() => onSelect(d.id)}
                style={{
                  flex: 1,
                  textAlign: 'left',
                  background: 'transparent',
                  border: 'none',
                  padding: '14px',
                  color: 'inherit',
                  minWidth: 0,
                }}
              >
                <div className="display" style={{
                  fontSize: '18px',
                  fontWeight: 500,
                  marginBottom: '3px',
                  fontStyle: 'italic',
                  overflow: 'hidden',
                  textOverflow: 'ellipsis',
                  whiteSpace: 'nowrap',
                }}>
                  {d.name || 'Без названия'}
                </div>
                <div style={{ fontSize: '11px', opacity: 0.7, lineHeight: 1.3 }}>
                  {d.subtitle ? d.subtitle + ' · ' : ''}{known}/{d.vocab.length}
                </div>
              </button>
              <button
                onClick={() => onEdit(d)}
                aria-label="Редактировать набор"
                style={{
                  background: 'transparent',
                  border: 'none',
                  borderLeft: `1px solid ${dividerColor}`,
                  padding: '0 14px',
                  color: 'inherit',
                  display: 'flex',
                  alignItems: 'center',
                }}
              >
                <Pencil size={14} />
              </button>
              {canDelete && (
                <button
                  onClick={() => {
                    if (confirm(`Удалить набор «${d.name}» вместе с прогрессом?`)) {
                      onDelete(d.id);
                    }
                  }}
                  aria-label="Удалить набор"
                  style={{
                    background: 'transparent',
                    border: 'none',
                    borderLeft: `1px solid ${dividerColor}`,
                    padding: '0 14px',
                    color: isActive ? COLORS.paper : COLORS.red,
                    display: 'flex',
                    alignItems: 'center',
                  }}
                >
                  <Trash2 size={14} />
                </button>
              )}
            </div>
          );
        })}
        <button
          onClick={onNew}
          style={{
            marginTop: '6px',
            padding: '14px',
            background: 'transparent',
            border: `1.5px dashed ${COLORS.muted}`,
            borderRadius: '12px',
            color: COLORS.ink,
            display: 'flex',
            alignItems: 'center',
            justifyContent: 'center',
            gap: '8px',
            fontSize: '14px',
            fontWeight: 500,
          }}
        >
          <Plus size={16} />
          Новый набор
        </button>
      </div>
    </Modal>
  );
}

function DeckEditor({ deck, canDelete, onSave, onDelete, onCancel }) {
  const isNew = !!deck.isNew;
  const [name, setName] = useState(deck.name || '');
  const [subtitle, setSubtitle] = useState(deck.subtitle || '');
  const [frontLabel, setFrontLabel] = useState(deck.frontLabel || 'DE');
  const [backLabel, setBackLabel] = useState(deck.backLabel || 'RU');
  const [wordsText, setWordsText] = useState(vocabToText(deck.vocab));

  const parsedCount = useMemo(() => parseVocabText(wordsText, deck.vocab || []).length, [wordsText, deck.vocab]);

  const handleSave = () => {
    const vocab = parseVocabText(wordsText, deck.vocab || []);
    const updated = {
      id: isNew ? `custom_${Date.now()}_${Math.floor(Math.random() * 1000)}` : deck.id,
      name: name.trim() || 'Без названия',
      subtitle: subtitle.trim(),
      frontLabel: frontLabel.trim() || 'DE',
      backLabel: backLabel.trim() || 'RU',
      vocab,
    };
    onSave(updated, isNew);
  };

  const handleDelete = () => {
    if (confirm(`Удалить набор «${deck.name}» вместе с прогрессом?`)) {
      onDelete(deck.id);
    }
  };

  const fLabel = frontLabel.trim() || 'DE';
  const bLabel = backLabel.trim() || 'RU';

  return (
    <Modal title={isNew ? 'Новый набор' : 'Редактирование'} onClose={onCancel}>
      <div style={{ display: 'flex', flexDirection: 'column', gap: '14px' }}>
        <Field label="Название">
          <Input value={name} onChange={setName} placeholder="Reisen, Cooking, ..." />
        </Field>
        <Field label="Подзаголовок (необязательно)">
          <Input value={subtitle} onChange={setSubtitle} placeholder="Тема, описание..." />
        </Field>
        <div style={{ display: 'flex', gap: '10px' }}>
          <Field label="Метка слова" flex>
            <Input value={frontLabel} onChange={setFrontLabel} placeholder="DE" />
          </Field>
          <Field label="Метка перевода" flex>
            <Input value={backLabel} onChange={setBackLabel} placeholder="RU" />
          </Field>
        </div>
        <Field label={`Слова  ·  ${parsedCount} распознано`}>
          <div style={{ fontSize: '11px', color: COLORS.muted, marginBottom: '6px', lineHeight: 1.4 }}>
            Одна пара на строку. Разделитель: <span className="mono">—</span>, <span className="mono">–</span>, <span className="mono">|</span>, <span className="mono">=</span>, <span className="mono"> - </span> или табуляция.<br />
            Из Quizlet: ⋯ → Export → разделители «Tab» + «New line» → Copy text → вставьте сюда.
          </div>
          <textarea
            value={wordsText}
            onChange={e => setWordsText(e.target.value)}
            rows={12}
            placeholder={`${fLabel === 'DE' ? 'Reise' : 'слово 1'} — ${bLabel === 'RU' ? 'путешествие' : 'translation 1'}\n${fLabel === 'DE' ? 'Hotel' : 'слово 2'} — ${bLabel === 'RU' ? 'отель' : 'translation 2'}\n...`}
            spellCheck={false}
            style={{
              width: '100%',
              padding: '12px',
              fontFamily: "'Geist', sans-serif",
              fontSize: '13px',
              lineHeight: 1.5,
              background: COLORS.paper,
              border: `1px solid ${COLORS.line}`,
              borderRadius: '10px',
              color: COLORS.ink,
              resize: 'vertical',
              minHeight: '180px',
              outline: 'none',
            }}
          />
        </Field>
        <button
          onClick={handleSave}
          style={{
            padding: '14px',
            background: COLORS.ink,
            color: COLORS.paper,
            border: 'none',
            borderRadius: '12px',
            fontSize: '14px',
            fontWeight: 500,
            display: 'flex',
            alignItems: 'center',
            justifyContent: 'center',
            gap: '6px',
          }}
        >
          <Check size={15} />
          {isNew ? 'Создать набор' : 'Сохранить'}
        </button>
        {canDelete && (
          <button
            onClick={handleDelete}
            style={{
              padding: '12px',
              background: 'transparent',
              color: COLORS.red,
              border: `1px solid ${COLORS.red}`,
              borderRadius: '10px',
              fontSize: '13px',
              display: 'flex',
              alignItems: 'center',
              justifyContent: 'center',
              gap: '6px',
            }}
          >
            <Trash2 size={14} /> Удалить набор
          </button>
        )}
      </div>
    </Modal>
  );
}

function Field({ label, children, flex }) {
  return (
    <div style={{ display: 'flex', flexDirection: 'column', gap: '6px', flex: flex ? 1 : 'initial', minWidth: 0 }}>
      <label style={{ fontSize: '11px', color: COLORS.muted, letterSpacing: '0.05em', textTransform: 'uppercase' }}>
        {label}
      </label>
      {children}
    </div>
  );
}

function Input({ value, onChange, placeholder }) {
  return (
    <input
      value={value}
      onChange={e => onChange(e.target.value)}
      placeholder={placeholder}
      spellCheck={false}
      style={{
        padding: '11px 12px',
        background: COLORS.paper,
        border: `1px solid ${COLORS.line}`,
        borderRadius: '10px',
        color: COLORS.ink,
        fontSize: '14px',
        fontFamily: "'Geist', sans-serif",
        width: '100%',
        outline: 'none',
      }}
    />
  );
}

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<App />);
</script>
</body>
